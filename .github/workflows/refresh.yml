name: Refresh dashboards

on:
  schedule:
    - cron: "*/15 * * * *"      # every 15 minutes (UTC)
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a running refresh - runs can exceed the 10-min dispatch interval,
# and cancelling in progress meant no run ever finished. GitHub keeps at most one
# pending run per group, so newer dispatches still replace the queued one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet openpyxl

      - name: Restore cached reports + Command Center history
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
          key: reports-${{ github.run_id }}
          restore-keys: reports-

      # ---- Contest dashboard (still fed by emailed reports) ----
      - name: Fetch newest reports from Gmail
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python build/fetch_gmail.py || echo "Gmail fetch failed - using cached reports"

      - name: Parse reports -> site/hyperion-data.js
        run: |
          if [ -f data/sales_by_rep.xlsx ] && [ -f data/installed_by_rep.xlsx ]; then
            python build/parse_reports.py
          else
            echo "Missing report file(s) - deploying last committed data."
            ls -la data/ 2>/dev/null || true
          fi

      # ---- Command Center + 4 Day Call board (live from the ServiceTitan API) ----
      - name: Command Center -> site/command-center/data.json
        env:
          ST_SECRETS_JSON: ${{ secrets.ST_SECRETS_JSON }}
          ST_TIMEOUT: "120"
        run: |
          mkdir -p secrets
          printf '%s' "$ST_SECRETS_JSON" > secrets/servicetitan.json
          python build/command_center_refresh.py || echo "ST refresh failed - deploying cached data.json"
          python build/call_board_refresh.py || echo "Call board refresh failed - deploying cached data.json"
          rm -rf secrets

      - name: Save reports + history for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
          key: reports-${{ github.run_id }}

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
