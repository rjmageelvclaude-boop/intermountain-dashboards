name: Refresh dashboards

on:
  schedule:
    # Every 10 minutes, offset from :00/:15/:30/:45 - GitHub delays scheduled
    # runs the most at the popular round-number marks.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # A run can dead-queue on GitHub's side (runner never assigned - happened
  # 2026-07-13, froze every board for 12 hours). It never starts, never times
  # out, and holds the concurrency slot forever, so no later dispatch runs.
  # This job carries no concurrency lock and no dependency on the build job,
  # so it executes on every dispatch regardless of the jam, and cancels any
  # run stuck long past what a healthy cycle can take.
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: write
    steps:
      - name: Cancel dead-queued runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SELF: ${{ github.run_id }}
        run: |
          now=$(date -u +%s)
          gh api "repos/$REPO/actions/workflows/refresh.yml/runs?per_page=100" \
            --jq '.workflow_runs[] | select(.status != "completed") | "\(.id) \(.status) \(.created_at)"' |
          while read -r id status created; do
            [ "$id" = "$SELF" ] && continue
            age=$(( (now - $(date -u -d "$created" +%s)) / 60 ))
            # Healthy runs build in ~5 min (job timeout 25); queueing behind
            # an active build is bounded by that build. Anything beyond these
            # limits is wedged, and a wedged queued run blocks all boards.
            case "$status" in
              in_progress) limit=35 ;;
              *)           limit=20 ;;  # queued / pending / waiting / requested
            esac
            if [ "$age" -ge "$limit" ]; then
              echo "::warning title=Watchdog::cancelling stuck run $id ($status for ${age} min)"
              gh api -X POST "repos/$REPO/actions/runs/$id/cancel" \
                || gh api -X POST "repos/$REPO/actions/runs/$id/force-cancel" \
                || true
            fi
          done

  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Never cancel a run that is already building: a cancelled run never
    # reaches the deploy step (the site silently stops updating). New
    # dispatches queue behind the active run; GitHub keeps at most one queued
    # and drops the rest. Job-level (not workflow-level) so a wedged build
    # can never block the watchdog above.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Pinned major: an unexpected cryptography release must not silently
        # publish the scorecard without its pay section.
        run: pip install --quiet "cryptography~=49.0"

      - name: Restore cached board histories
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
            site/scorecard/data.json
            site/wow-board/data.json
            site/member-board/data.json
            site/gm-board/data.json
            site/comfort-board/data.json
            site/callback-board/data.json
          key: reports-${{ github.run_id }}
          restore-keys: reports-

      # ---- All dashboards, live from the ServiceTitan API.
      # The boards are independent processes writing independent files, so
      # they run in parallel - wall time is the slowest board, not the sum.
      # Each process throttles itself (ST_MAX_CONCURRENCY) and the client
      # retries 429s with backoff, so the combined load stays polite.
      - name: Refresh all dashboards
        timeout-minutes: 15
        continue-on-error: true
        env:
          ST_SECRETS_JSON: ${{ secrets.ST_SECRETS_JSON }}
          ST_TIMEOUT: "120"
          ST_PAGE_CONCURRENCY: "4"   # concurrent pages per list fetch
          # In-flight cap per board process. Boards also thread their three
          # companies, so keep each process's slice of the API modest.
          ST_MAX_CONCURRENCY: "6"
          # Bound each board's closed-month YTD backfill: at most this many seconds
          # per run, resuming from the cached history file on the next run.
          TECH_BOARD_BUDGET: "90"
          PLUMB_BOARD_BUDGET: "90"
          CSR_BOARD_BUDGET: "90"
          INSTALL_BOARD_BUDGET: "120"
          SILO_BOARD_BUDGET: "120"
          GOAT_BOARD_BUDGET: "90"
          SCORECARD_BUDGET: "120"
          # Generous: a cold cache re-backfills every week since May 1 in one run.
          WOW_BOARD_BUDGET: "300"
          MEMBER_BOARD_BUDGET: "300"
          # Backfills at most current + 2 closed months per run; a cold cache
          # converges over ~3 runs. Steady state is ~90s.
          GM_BOARD_BUDGET: "420"
          # Cold cache backfills 19 months x 4 tenants over a few runs
          # (months now also fetch crew assignments + appointment hours);
          # steady state only recomputes the current month + open callbacks.
          CALLBACK_BOARD_BUDGET: "300"
          # Customer privacy: names ship only as an AES-256-GCM blob under
          # this passphrase, unlocked in the browser by the viewer;
          # unset -> the board publishes without customer names.
          GM_BOARD_KEY: ${{ secrets.GM_BOARD_KEY }}
          # Pay privacy: pay ships only as an AES-256-GCM blob under this
          # passphrase; unset -> the scorecard publishes without pay.
          SCORECARD_KEY: ${{ secrets.SCORECARD_KEY }}
          SCORECARD_STORE_PIN: ${{ secrets.SCORECARD_STORE_PIN }}
        run: |
          mkdir -p secrets logs
          printf '%s' "$ST_SECRETS_JSON" > secrets/servicetitan.json

          # Boards staggered a touch so eight processes don't hit the auth
          # server in the same instant.
          for board in command_center call_board ca_board comfort_board tech_board plumb_board csr_board install_board silo_board wow_board member_board gm_board callback_board; do
            python "build/${board}_refresh.py" > "logs/${board}.log" 2>&1 \
              || echo "${board} refresh failed - deploying cached data.json" >> "logs/${board}.log" &
            sleep 2
          done
          wait

          # GOAT board and Scorecard read the other boards' data.json - always last
          python build/goat_board_refresh.py > logs/goat_board.log 2>&1 \
            || echo "GOAT board refresh failed - deploying cached data.json" >> logs/goat_board.log &
          python build/scorecard_refresh.py > logs/scorecard.log 2>&1 \
            || echo "scorecard refresh failed - deploying cached data.json" >> logs/scorecard.log &
          wait

          for f in logs/*.log; do echo "::group::$f"; cat "$f"; echo "::endgroup::"; done

      - name: Clean up secrets
        if: always()
        run: rm -rf secrets logs

      # A board whose refresh keeps failing deploys its cached data.json
      # forever without failing the run - surface that as a warning here.
      # mtime survives the Actions cache (tar), so it is "when a refresh
      # last succeeded" regardless of which run wrote the file.
      - name: Data freshness check
        run: |
          stale=0
          for f in site/*/data.json; do
            age=$(( $(date +%s) - $(stat -c %Y "$f") ))
            if [ $age -gt 7200 ]; then
              echo "::warning title=Stale dashboard data::$f last written $((age/60)) min ago - its refresh has been failing"
              stale=1
            fi
          done
          [ $stale -eq 0 ] && echo "All boards fresh." || true

      - name: Save board histories for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
            site/scorecard/data.json
            site/wow-board/data.json
            site/member-board/data.json
            site/gm-board/data.json
            site/comfort-board/data.json
            site/callback-board/data.json
          key: reports-${{ github.run_id }}

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
