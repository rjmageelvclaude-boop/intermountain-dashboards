name: Refresh dashboards

on:
  schedule:
    # Every 10 minutes, offset from :00/:15/:30/:45 - GitHub delays scheduled
    # runs the most at the popular round-number marks.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:            # manual "Run workflow" button
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel a run that is already building: a cancelled run never reaches
# the deploy step (the site silently stops updating). New dispatches queue
# behind the active run; GitHub keeps at most one queued and drops the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Pinned major: an unexpected cryptography release must not silently
        # publish the scorecard without its pay section.
        run: pip install --quiet "cryptography~=49.0"

      - name: Restore cached board histories
        uses: actions/cache/restore@v4
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
            site/scorecard/data.json
          key: reports-${{ github.run_id }}
          restore-keys: reports-

      # ---- All dashboards, live from the ServiceTitan API.
      # The boards are independent processes writing independent files, so
      # they run in parallel - wall time is the slowest board, not the sum.
      # Each process throttles itself (ST_MAX_CONCURRENCY) and the client
      # retries 429s with backoff, so the combined load stays polite.
      - name: Refresh all dashboards
        timeout-minutes: 15
        continue-on-error: true
        env:
          ST_SECRETS_JSON: ${{ secrets.ST_SECRETS_JSON }}
          ST_TIMEOUT: "120"
          ST_PAGE_CONCURRENCY: "4"   # concurrent pages per list fetch
          # In-flight cap per board process. Boards also thread their three
          # companies, so keep each process's slice of the API modest.
          ST_MAX_CONCURRENCY: "6"
          # Bound each board's closed-month YTD backfill: at most this many seconds
          # per run, resuming from the cached history file on the next run.
          TECH_BOARD_BUDGET: "90"
          PLUMB_BOARD_BUDGET: "90"
          CSR_BOARD_BUDGET: "90"
          INSTALL_BOARD_BUDGET: "120"
          SILO_BOARD_BUDGET: "120"
          GOAT_BOARD_BUDGET: "90"
          SCORECARD_BUDGET: "120"
          # Pay privacy: pay ships only as an AES-256-GCM blob under this
          # passphrase; unset -> the scorecard publishes without pay.
          SCORECARD_KEY: ${{ secrets.SCORECARD_KEY }}
          SCORECARD_STORE_PIN: ${{ secrets.SCORECARD_STORE_PIN }}
        run: |
          mkdir -p secrets logs
          printf '%s' "$ST_SECRETS_JSON" > secrets/servicetitan.json

          # Boards staggered a touch so eight processes don't hit the auth
          # server in the same instant.
          for board in command_center call_board ca_board tech_board plumb_board csr_board install_board silo_board; do
            python "build/${board}_refresh.py" > "logs/${board}.log" 2>&1 \
              || echo "${board} refresh failed - deploying cached data.json" >> "logs/${board}.log" &
            sleep 2
          done
          wait

          # GOAT board and Scorecard read the other boards' data.json - always last
          python build/goat_board_refresh.py > logs/goat_board.log 2>&1 \
            || echo "GOAT board refresh failed - deploying cached data.json" >> logs/goat_board.log &
          python build/scorecard_refresh.py > logs/scorecard.log 2>&1 \
            || echo "scorecard refresh failed - deploying cached data.json" >> logs/scorecard.log &
          wait

          for f in logs/*.log; do echo "::group::$f"; cat "$f"; echo "::endgroup::"; done

      - name: Clean up secrets
        if: always()
        run: rm -rf secrets logs

      # A board whose refresh keeps failing deploys its cached data.json
      # forever without failing the run - surface that as a warning here.
      # mtime survives the Actions cache (tar), so it is "when a refresh
      # last succeeded" regardless of which run wrote the file.
      - name: Data freshness check
        run: |
          stale=0
          for f in site/*/data.json; do
            age=$(( $(date +%s) - $(stat -c %Y "$f") ))
            if [ $age -gt 7200 ]; then
              echo "::warning title=Stale dashboard data::$f last written $((age/60)) min ago - its refresh has been failing"
              stale=1
            fi
          done
          [ $stale -eq 0 ] && echo "All boards fresh." || true

      - name: Save board histories for next run
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            data
            site/command-center/data.json
            site/call-board/data.json
            site/ca-board/data.json
            site/tech-board/data.json
            site/plumb-board/data.json
            site/csr-board/data.json
            site/install-board/data.json
            site/silo-board/data.json
            site/goat-board/data.json
            site/scorecard/data.json
          key: reports-${{ github.run_id }}

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
