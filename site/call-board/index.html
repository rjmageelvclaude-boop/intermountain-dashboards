<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>4 Day Call Board</title>
<style>
/* ── theme tokens (data-theme is always stamped by JS; data-co picks the accent) ── */
:root{
  --page:#f4f6f9; --surface:#ffffff; --surface2:#f1f3f7; --ink:#17212f; --muted:#687382; --faint:#98a2b3;
  --hair:#e4e8ef; --hair2:#d5dbe5;
  --good:#157a4c; --good-bg:#e3f3ea; --bad:#bb3540; --bad-bg:#fae8ea;
  --bar-track:#e9edf3; --wkend:#fdf7ea;
  --c-hvac_svc:#1d4ed8; --c-hvac_mnt:#047857; --c-plumb_drn:#0e7490; --c-plumb_mnt:#6d28d9; --c-plumb_svc:#b45309;
  --c-elec_svc:#a16207; --c-elec_mnt:#4d7c0f; --c-excav_sls:#9f1239; --c-excav_ins:#7c2d12;
}
:root[data-theme="dark"]{
  --page:#0b1120; --surface:#131b2b; --surface2:#1a2438; --ink:#eaeff7; --muted:#93a0b4; --faint:#6d7a90;
  --hair:rgba(255,255,255,.08); --hair2:rgba(255,255,255,.16);
  --good:#4bd695; --good-bg:rgba(75,214,149,.13); --bad:#ff858e; --bad-bg:rgba(255,133,142,.12);
  --bar-track:rgba(255,255,255,.10); --wkend:rgba(240,178,104,.07);
  --c-hvac_svc:#8ab4ff; --c-hvac_mnt:#4bd695; --c-plumb_drn:#67d3e8; --c-plumb_mnt:#c4a5ff; --c-plumb_svc:#f0b268;
  --c-elec_svc:#facc15; --c-elec_mnt:#a3e635; --c-excav_sls:#fb7185; --c-excav_ins:#fdba74;
}
:root[data-co="sierra"]{--accent:#24408e;--accent-ink:#fff;--tint:rgba(36,64,142,.06);--tint2:rgba(36,64,142,.12)}
:root[data-co="ultimate"]{--accent:#6d28d9;--accent-ink:#fff;--tint:rgba(109,40,217,.06);--tint2:rgba(109,40,217,.12)}
:root[data-co="russett"]{--accent:#b91c1c;--accent-ink:#fff;--tint:rgba(185,28,28,.06);--tint2:rgba(185,28,28,.12)}
:root[data-theme="dark"][data-co="sierra"]{--accent:#7db2ff;--accent-ink:#0b1120;--tint:rgba(125,178,255,.08);--tint2:rgba(125,178,255,.18)}
:root[data-theme="dark"][data-co="ultimate"]{--accent:#c4a5ff;--accent-ink:#0b1120;--tint:rgba(196,165,255,.08);--tint2:rgba(196,165,255,.18)}
:root[data-theme="dark"][data-co="russett"]{--accent:#ff8f96;--accent-ink:#0b1120;--tint:rgba(255,143,150,.08);--tint2:rgba(255,143,150,.18)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--page);color:var(--ink);min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px 40px}

/* ── shell ── */
.board{background:var(--surface);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(13,25,45,.05)}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 20px 12px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
.wordmark{font-size:19px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
.wordmark small{display:block;font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}
.co-chip{display:inline-flex;align-items:center;gap:7px;background:var(--tint2);color:var(--accent);font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px;white-space:nowrap}
.co-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.tabs{display:flex;gap:3px;background:var(--tint);padding:4px;border-radius:10px;margin-left:auto;flex-wrap:wrap}
.tab{font-size:11.5px;font-weight:600;color:var(--muted);padding:6px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;user-select:none}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--accent);color:var(--accent-ink);font-weight:700}
.updated{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);white-space:nowrap}
.updated .pulse{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion: reduce){.updated .pulse{animation:none}}
.theme-btn{border:1px solid var(--hair2);background:transparent;color:var(--muted);font-size:13px;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit}
.theme-btn:hover{color:var(--ink)}
.theme-btn:focus-visible,.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── 4-day grid ── */
.tbl-scroll{overflow-x:auto}
table.b4{width:100%;border-collapse:collapse;min-width:820px}
table.b4 th,table.b4 td{padding:9px 16px;text-align:center;font-variant-numeric:tabular-nums}
table.b4 th:first-child,table.b4 td:first-child{text-align:left;padding-left:20px;width:23%}
table.b4 thead th{border-bottom:1px solid var(--hair2);padding-top:14px;padding-bottom:11px;vertical-align:top}
.dayname{font-size:15px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.daydate{font-size:11.5px;font-weight:600;color:var(--faint);margin-top:1px}
.wx{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;font-size:12px;font-weight:600;color:var(--muted)}
.wx svg{width:17px;height:17px;flex:none}
.today-flag{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.12em;color:var(--accent);background:var(--tint2);border-radius:4px;padding:2px 7px;margin-bottom:4px}
td.today,th.today{background:var(--tint)}
th.today{box-shadow:inset 0 3px 0 var(--accent)}
tr.group td{padding:12px 16px 3px 20px;text-align:left;border-bottom:none}
tr.group span{font-size:10.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
tbody tr:not(.group) td{border-bottom:1px solid var(--hair)}
tbody tr:last-child td{border-bottom:none}
.rowlbl{font-size:13px;font-weight:600;color:var(--muted)}
.rowlbl .hint{font-size:10.5px;color:var(--faint);font-weight:500;display:block}
.num{font-size:23px;font-weight:700;line-height:1.15}
.num.hero{font-size:29px;font-weight:800}
.num.dim{color:var(--muted);font-size:19px;font-weight:600}
.sub{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:1px}
.capbar{height:5px;border-radius:3px;background:var(--bar-track);margin:6px auto 0;max-width:110px;position:relative;overflow:hidden}
.capbar i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:var(--bad)}
.capbar.full i{background:var(--good)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:700;padding:3px 11px;border-radius:999px}
.chip.up{color:var(--good);background:var(--good-bg)}
.chip.down{color:var(--bad);background:var(--bad-bg)}
.chip small{font-size:9.5px}
.dash{color:var(--faint);font-weight:600}
.edit{cursor:pointer}
.edit:hover{outline:2px dashed var(--accent);outline-offset:-2px;border-radius:6px}
.sub.edit{display:inline-block;padding:1px 5px}
.sub.edit:hover{color:var(--accent)}
.footer{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:10px 20px 12px;font-size:11px;font-weight:500;color:var(--faint);border-top:1px solid var(--hair)}
.feed-err{margin-top:10px;font-size:12px;font-weight:700;color:var(--bad)}

/* ── upcoming view ── */
.up-body{padding:16px 20px 4px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--hair);border-radius:10px;padding:12px 14px;border-top:3px solid var(--accent)}
.card .c-label{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:5px}
.card .c-val{font-size:24px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.card .c-sub{font-size:11px;margin-top:5px;font-weight:600;color:var(--faint)}
.up-scroll{overflow:auto;max-height:70vh;border:1px solid var(--hair);border-radius:10px;margin-bottom:12px}
table.up{width:100%;min-width:820px;border-collapse:separate;border-spacing:0;font-size:13px}
table.up th,table.up td{padding:6px 12px;font-weight:600;text-align:center;border-bottom:1px solid var(--hair);white-space:nowrap;font-variant-numeric:tabular-nums}
table.up thead th{position:sticky;background:var(--surface2);color:var(--ink);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;z-index:2;border-bottom:1px solid var(--hair2)}
table.up thead tr:first-child th{top:0}
table.up thead tr:last-child th{top:27px}
table.up td:first-child,table.up th:first-child{text-align:left;padding-left:14px}
table.up .grp{border-left:1px solid var(--hair2)}
table.up tbody tr.wkend td{background:var(--wkend)}
table.up tbody tr:hover td{background:var(--tint)}
table.up .subtot{font-weight:800;background:var(--surface2)}
table.up .grand{font-weight:800}
table.up tr.uptotal td{background:var(--accent);color:var(--accent-ink);font-weight:800;position:sticky;bottom:0;border-bottom:none}
.ck-hvac_svc{color:var(--c-hvac_svc)}.ck-hvac_mnt{color:var(--c-hvac_mnt)}.ck-plumb_drn{color:var(--c-plumb_drn)}.ck-plumb_mnt{color:var(--c-plumb_mnt)}.ck-plumb_svc{color:var(--c-plumb_svc)}
.ck-elec_svc{color:var(--c-elec_svc)}.ck-elec_mnt{color:var(--c-elec_mnt)}.ck-excav_sls{color:var(--c-excav_sls)}.ck-excav_ins{color:var(--c-excav_ins)}
.bt-hvac_svc{border-top-color:var(--c-hvac_svc)!important}.bt-hvac_mnt{border-top-color:var(--c-hvac_mnt)!important}.bt-plumb_drn{border-top-color:var(--c-plumb_drn)!important}.bt-plumb_mnt{border-top-color:var(--c-plumb_mnt)!important}.bt-plumb_svc{border-top-color:var(--c-plumb_svc)!important}
.bt-elec_svc{border-top-color:var(--c-elec_svc)!important}.bt-elec_mnt{border-top-color:var(--c-elec_mnt)!important}.bt-excav_sls{border-top-color:var(--c-excav_sls)!important}.bt-excav_ins{border-top-color:var(--c-excav_ins)!important}
.up-d{font-size:11.5px;font-weight:700}
.up-d.p{color:var(--good)}.up-d.n{color:var(--bad)}.up-d.z{color:var(--faint);font-weight:600}
.uptotal .up-d{color:var(--accent-ink)}
@media(max-width:900px){.wordmark{font-size:16px}.num{font-size:19px}.num.hero{font-size:23px}}
@media(max-width:700px){
  .wrap{padding:12px 8px 28px}
  .topbar{padding:12px 12px 10px;gap:10px}
  .tabs{margin-left:0;width:100%;order:5}
  table.b4 th,table.b4 td{padding:8px 10px}
  table.b4 th:first-child,table.b4 td:first-child{padding-left:12px}
  .num{font-size:17px}
  .num.hero{font-size:21px}
  .footer{padding:10px 12px}
  .up-body{padding:12px 12px 4px}
}
</style>
</head>
<body>
<div class="wrap" id="app">
<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:var(--faint)"><div style="text-align:center"><div style="font-size:32px;margin-bottom:12px">📞</div><div style="font-size:14px;font-weight:600">Loading 4 Day Call Board...</div></div></div>
</div>
<script>
// Manual inputs (techs available / calls needed / ROPPs needed) are shared for
// all viewers through the same PIN-protected Apps Script store the Command
// Center uses for budgets, namespaced under co="callboard".
const BUDGET_URL="https://script.google.com/macros/s/AKfycby-J4xARcDQoDUwSfX6qsjYnM_QZyDfhd09WVBQXomJkLsrDysnkw-L0EZu0_S9Q4kz-w/exec";
const DATA_URL="data.json";
const REFRESH_MINUTES=5;      // re-pull data.json + shared inputs
const ROPP_GREEN_PCT=35;      // ROPP % turns green at/above this

const PIN_KEY="pcc-pin";      // same PIN cache as the Command Center
const LS_KEY="cb-settings-v1";
const TAB_KEY="cb-tab-v1";
const THEME_KEY="cb-theme";
const ORDER=["sierra-hvac","sierra-plumbing","ultimate-hvac","ultimate-plumbing","russett-hvac","brothers-hvac","brothers-plumbing","brothers-electrical","brothers-excavation","up-sierra","up-ultimate","up-russett","up-brothers"];
const TAB_LABEL={"sierra-hvac":"Sierra HVAC","sierra-plumbing":"Sierra Plumbing","ultimate-hvac":"Ultimate HVAC","ultimate-plumbing":"Ultimate Plumbing","russett-hvac":"Russett HVAC","brothers-hvac":"Brothers HVAC","brothers-plumbing":"Brothers Plumbing","brothers-electrical":"Brothers Electrical","brothers-excavation":"Brothers Excavation","up-sierra":"Sierra Upcoming","up-ultimate":"Ultimate Upcoming","up-russett":"Russett Upcoming","up-brothers":"Brothers Upcoming"};
const CO_SHORT={sierra:"Sierra",ultimate:"Ultimate",russett:"Russett",brothers:"Brothers"};

let data=null,settings=JSON.parse(localStorage.getItem(LS_KEY)||"{}"),synced=false;
let idx=Math.max(0,ORDER.indexOf(localStorage.getItem(TAB_KEY))),feedError=null;

// ── theme ──
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);localStorage.setItem(THEME_KEY,t)}
applyTheme(localStorage.getItem(THEME_KEY)||(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");render()}

// ── shared settings (Apps Script) ──
async function post(body){
  var r=await fetch(BUDGET_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return r.json();
}
async function loadSettings(){
  try{
    var j=await post({action:"getBudgets"});
    if(j&&j.ok){settings=(j.budgets&&j.budgets.callboard)||{};synced=true;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
  }catch(e){console.warn("Shared inputs unavailable - using this device's saved values",e)}
}
async function saveSetting(key,value){
  settings[key]=value;localStorage.setItem(LS_KEY,JSON.stringify(settings));render();
  if(!synced)return;
  var pin=localStorage.getItem(PIN_KEY)||prompt("Enter the PIN to save shared board inputs:");
  if(!pin)return;
  try{
    var j=await post({action:"setBudget",pin:pin,co:"callboard",key:key,value:value});
    if(j&&j.ok){localStorage.setItem(PIN_KEY,pin);settings=(j.budgets&&j.budgets.callboard)||settings;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
    else if(j&&j.error==="bad-pin"){localStorage.removeItem(PIN_KEY);alert("Wrong PIN - change was NOT saved for other viewers.")}
    else{alert("Could not save shared input: "+((j&&j.error)||"unknown error"))}
  }catch(e){alert("Could not reach the settings server - change saved on this device only.")}
  render();
}
// value for a manual field: per-date override, else board default
function getVal(board,date,field){
  var v=settings[board+"|"+date+"|"+field];
  if(v===undefined||v==="")v=settings[board+"|default|"+field];
  return(v===undefined||v==="")?null:Number(v);
}
function editCell(board,date,field,label,dayLabel){
  var cur=getVal(board,date,field);
  var v=prompt(label+" - "+dayLabel+":",cur===null?"":cur);
  if(v===null)return;
  v=v.trim();
  if(v!==""&&isNaN(Number(v))){alert("Enter a number.");return}
  saveSetting(board+"|"+date+"|"+field,v===""?"":Number(v));
}
function editDefault(board,field,label){
  var cur=settings[board+"|default|"+field];
  var v=prompt(label+" - default for ALL days on this board (per-day edits override it):",cur===undefined?"":cur);
  if(v===null)return;
  v=v.trim();
  if(v!==""&&isNaN(Number(v))){alert("Enter a number.");return}
  saveSetting(board+"|default|"+field,v===""?"":Number(v));
}

// ── weather (inline SVG so every TV renders the same icons) ──
function wxIcon(code){
  var sun='<circle cx="12" cy="12" r="4.4" fill="#e0a10c"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5 5l2.1 2.1M16.9 16.9L19 19M19 5l-2.1 2.1M7.1 16.9L5 19" stroke="#e0a10c" stroke-width="2"/>';
  var cloud='<path d="M7 16a4.5 4.5 0 1 1 .8-8.9A5.5 5.5 0 0 1 18.6 9.5 3.8 3.8 0 0 1 17.8 17H7z" fill="#8ea3bd"/>';
  var partly='<circle cx="9" cy="9" r="3.6" fill="#e0a10c"/><path d="M9 2.5v2M2.5 9h2M4.4 4.4l1.4 1.4M13.6 4.4l-1.4 1.4" stroke="#e0a10c" stroke-width="1.8"/><path d="M9.5 18a3.8 3.8 0 1 1 .7-7.5A4.6 4.6 0 0 1 19.2 12 3.2 3.2 0 0 1 18.5 18H9.5z" fill="#8ea3bd"/>';
  var rain=cloud.replace('16a','15a').replace('9.5','8.5').replace('17H','16H')+'<path d="M9 18.2v2.2M13 18.2v2.2M17 18.2v2.2" stroke="#5b9bd5" stroke-width="1.8" stroke-linecap="round"/>';
  var snow=cloud.replace('16a','15a').replace('9.5','8.5').replace('17H','16H')+'<path d="M9 19.5h.01M13 20.5h.01M16.5 19h.01" stroke="#9db8d8" stroke-width="2.4" stroke-linecap="round"/>';
  var storm=cloud.replace('16a','15a').replace('9.5','8.5').replace('17H','16H')+'<path d="M12.5 17l-2 3.4h2.6l-1.8 3.1" stroke="#e0a10c" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';
  var fog=cloud.replace('16a','14a').replace('9.5','7.5').replace('17H','15H')+'<path d="M6 18h12M8 21h9" stroke="#8ea3bd" stroke-width="1.8" stroke-linecap="round"/>';
  var body;
  if(code===0)body=sun;
  else if(code<=2)body=partly;
  else if(code===3)body=cloud;
  else if(code<=48)body=fog;
  else if(code<=67)body=rain;
  else if(code<=77)body=snow;
  else if(code<=82)body=rain;
  else body=storm;
  return'<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">'+body+'</svg>';
}

// ── render helpers ──
function fmtDate(iso){var d=new Date(iso+"T12:00:00");return d.toLocaleString("default",{month:"short",day:"numeric"})}
function fmtDisplay(iso){var p=iso.split("-");return parseInt(p[1])+"/"+parseInt(p[2])+"/"+p[0]}
function chip(v){return'<span class="chip '+(v>=0?"up":"down")+'"><small>'+(v>=0?"&#9650;":"&#9660;")+'</small>'+(v>0?"+":"")+v+'</span>'}
function pctChip(p){return'<span class="chip '+(p>=ROPP_GREEN_PCT?"up":"down")+'">'+p+'%</span>'}

function topbar(title,coChipText,updated){
  return'<div class="topbar">'+
    '<div class="wordmark">'+title+'<small>InterMountain Live Board</small></div>'+
    '<span class="co-chip"><span class="dot"></span>'+coChipText+'</span>'+
    '<div class="tabs">'+ORDER.map(function(k,i){
      return'<span class="tab'+(i===idx?" on":"")+'" tabindex="0" onclick="goTo('+i+')">'+TAB_LABEL[k]+'</span>';
    }).join("")+'</div>'+
    '<span class="updated"><span class="pulse"></span>'+updated+'</span>'+
    '<button class="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">'+(document.documentElement.getAttribute("data-theme")==="dark"?"&#9788;":"&#9789;")+'</button>'+
  '</div>';
}
function coOf(key){return key.indexOf("up-")===0?key.slice(3):(data.boards[key]||{}).company||"sierra"}

function render(){
  var app=document.getElementById("app");
  if(feedError&&!data){app.innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--faint);font-weight:600">'+feedError+'</div>';return}
  if(!data)return;
  document.documentElement.setAttribute("data-co",coOf(ORDER[idx]));
  if(ORDER[idx].indexOf("up-")===0){renderUpcoming(ORDER[idx].slice(3));return}
  var board=ORDER[idx],b=data.boards[board];
  if(!b){idx=0;board=ORDER[0];b=data.boards[board]}
  var wx=(data.weather||{})[b.company]||null;
  var gen=data.generatedAt?new Date(data.generatedAt).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}):"?";

  var hdr='<tr><th></th>'+b.days.map(function(d,i){
    var w=wx&&wx[d.date];
    return'<th'+(i===0?' class="today"':'')+'>'+(i===0?'<span class="today-flag">TODAY</span>':'')+
      '<div class="dayname">'+d.dow+'</div><div class="daydate">'+fmtDate(d.date)+'</div>'+
      (w?'<div class="wx">'+wxIcon(w.code)+w.min+'&deg; &ndash; '+w.max+'&deg;</div>':'')+
    '</th>';
  }).join("")+'</tr>';

  function cells(fn){return b.days.map(function(d,i){return'<td'+(i===0?' class="today"':'')+'>'+fn(d)+'</td>'}).join("")}
  function editableCells(field,label,fn){
    return b.days.map(function(d,i){
      return'<td class="edit'+(i===0?' today':'')+'" onclick="editCell(\''+board+'\',\''+d.date+'\',\''+field+'\',\''+label+'\',\''+d.dow+' '+fmtDate(d.date)+'\')">'+fn(d)+'</td>';
    }).join("");
  }
  function lbl(text,hint,field,label){
    var click=field?' class="rowlbl edit" onclick="editDefault(\''+board+'\',\''+field+'\',\''+label+'\')"':' class="rowlbl"';
    return'<td'+click+'>'+text+(hint?'<span class="hint">'+hint+'</span>':'')+'</td>';
  }

  var techs='<tr>'+lbl("Techs available","tap a day to edit &middot; here for default","techs","Techs Available")+
    editableCells("techs","Techs Available",function(d){
      var v=getVal(board,d.date,"techs");
      return v===null?'<span class="dash">&mdash;</span>':'<div class="num dim">'+v+'</div>';
    })+'</tr>';

  var onBoard='<tr>'+lbl("Calls on board","opportunities &middot; tap the target to edit","calls","Calls Needed")+
    b.days.map(function(d,i){
      var n=getVal(board,d.date,"calls");
      var bar="";
      if(n!==null&&n>0){
        var pct=Math.min(d.opps/n*100,100);
        bar='<div class="capbar'+(d.opps>=n?" full":"")+'"><i style="width:'+pct.toFixed(0)+'%"></i></div>';
      }
      var sub='<span class="sub edit" onclick="event.stopPropagation();editCell(\''+board+'\',\''+d.date+'\',\'calls\',\'Calls Needed\',\''+d.dow+' '+fmtDate(d.date)+'\')">'+
        (n===null?"set calls needed":"of "+n+" needed")+'</span>';
      return'<td'+(i===0?' class="today"':'')+'><div class="num hero">'+d.opps+'</div>'+bar+'<div>'+sub+'</div></td>';
    }).join("")+'</tr>';

  var nonOpp='<tr>'+lbl("Non-opportunity calls","not counted in variance")+
    cells(function(d){return'<div class="num dim">'+d.nonOpps+'</div>'})+'</tr>';

  var variance='<tr>'+lbl("Variance","opportunities minus calls needed")+
    cells(function(d){
      var n=getVal(board,d.date,"calls");
      return n===null?'<span class="dash">&mdash;</span>':chip(d.opps-n);
    })+'</tr>';

  var roppLabel=b.company==="brothers"?"Replacement Opportunity tag":(b.trade==="Plumbing"?"TROPP tag":"ROPP tag");
  var ropps='<tr>'+lbl("ROPPs on board",roppLabel+" &middot; tap the target to edit","ropps","Replacement Opps Needed")+
    b.days.map(function(d,i){
      var n=getVal(board,d.date,"ropps");
      var sub='<span class="sub edit" onclick="event.stopPropagation();editCell(\''+board+'\',\''+d.date+'\',\'ropps\',\'Replacement Opps Needed\',\''+d.dow+' '+fmtDate(d.date)+'\')">'+
        (n===null?"set ROPPs needed":"of "+n+" needed")+'</span>';
      return'<td'+(i===0?' class="today"':'')+'><div class="num">'+d.ropps+'</div><div>'+sub+'</div></td>';
    }).join("")+'</tr>';

  var roppVar='<tr>'+lbl("Variance","ROPPs minus needed")+
    cells(function(d){
      var n=getVal(board,d.date,"ropps");
      return n===null?'<span class="dash">&mdash;</span>':chip(d.ropps-n);
    })+'</tr>';

  var roppPct='<tr>'+lbl("ROPP share of board","target "+ROPP_GREEN_PCT+"%")+
    cells(function(d){
      if(!d.opps)return'<span class="dash">&mdash;</span>';
      return pctChip(Math.round(d.ropps/d.opps*100));
    })+'</tr>';

  app.innerHTML=
    '<div class="board">'+
      topbar("4 Day Call",b.companyShort+" &middot; "+b.title,"Updated "+gen)+
      '<div class="tbl-scroll"><table class="b4">'+
        '<thead>'+hdr+'</thead><tbody>'+
        '<tr class="group"><td colspan="5"><span>Capacity</span></td></tr>'+
        techs+onBoard+nonOpp+variance+
        '<tr class="group"><td colspan="5"><span>Replacement Opportunities</span></td></tr>'+
        ropps+roppVar+roppPct+
      '</tbody></table></div>'+
      '<div class="footer">'+
        '<span>Live from ServiceTitan &middot; opportunities = the job\'s Opportunity flag &middot; '+roppLabel+' minus Management Removed ROPP</span>'+
        '<span>Variance &amp; bars count opportunities only &middot; edits ask for the PIN once</span>'+
      '</div>'+
    '</div>'+
    (feedError?'<div class="feed-err">'+feedError+'</div>':'');
}

function renderUpcoming(company){
  var app=document.getElementById("app");
  var u=(data.upcoming||{})[company];
  var gen=data.generatedAt?new Date(data.generatedAt).toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}):"?";
  var head=topbar("Upcoming Jobs",CO_SHORT[company]+" &middot; Next 60 Days","Updated "+gen);
  if(!u){app.innerHTML='<div class="board">'+head+'<div style="text-align:center;padding:60px;color:var(--faint);font-weight:600">Upcoming jobs data unavailable for this company - it will appear after the next refresh.</div></div>';return}

  var cols=u.cols,keys=cols.map(function(c){return c.key});
  var groups=[];
  cols.forEach(function(c){var g=groups.find(function(x){return x.name===c.group});if(!g){g={name:c.group,cols:[]};groups.push(g)}g.cols.push(c)});
  var multiGroup=groups.length>1;

  var tot={},ptot={},gAll=0,pAll=0,hasPrev=!!u.prevByDay;
  keys.forEach(function(k){tot[k]=0;ptot[k]=0});
  u.days.forEach(function(d){keys.forEach(function(k){tot[k]+=d.counts[k]||0})});
  if(hasPrev)Object.keys(u.prevByDay).forEach(function(iso){keys.forEach(function(k){ptot[k]+=(u.prevByDay[iso][k]||0)})});
  keys.forEach(function(k){gAll+=tot[k];pAll+=ptot[k]});

  function dHtml(cur,prev){
    var d=cur-prev;
    if(d>0)return'<span class="up-d p">&#9650; +'+d+'</span>';
    if(d<0)return'<span class="up-d n">&#9660; '+d+'</span>';
    return'<span class="up-d z">&mdash;</span>';
  }

  var cards='<div class="cards">'+
    '<div class="card"><div class="c-label">Total Jobs</div><div class="c-val">'+gAll+'</div><div class="c-sub">'+(hasPrev?dHtml(gAll,pAll)+' vs '+fmtDate(u.prevDate):u.days.length+' days covered')+'</div></div>'+
    cols.map(function(c){
      return'<div class="card bt-'+c.key+'"><div class="c-label">'+c.group+' - '+c.label+'</div><div class="c-val ck-'+c.key+'">'+tot[c.key]+'</div><div class="c-sub">'+(hasPrev?dHtml(tot[c.key],ptot[c.key]):'')+'</div></div>';
    }).join("")+'</div>';

  var h1='<tr><th rowspan="2" style="vertical-align:middle">Date</th><th rowspan="2" style="vertical-align:middle">Day</th>';
  var h2='<tr>';
  groups.forEach(function(g){
    h1+='<th colspan="'+(g.cols.length+(multiGroup?1:0))+'" class="grp">'+g.name+'</th>';
    g.cols.forEach(function(c,i){h2+='<th'+(i===0?' class="grp"':'')+'>'+c.label+'</th>'});
    if(multiGroup)h2+='<th>Subtotal</th>';
  });
  h1+='<th rowspan="2" class="grp" style="vertical-align:middle">Grand Total</th>'+(hasPrev?'<th rowspan="2" style="vertical-align:middle">Change</th>':'')+'</tr>';
  h2+='</tr>';

  var rows='';
  u.days.forEach(function(d){
    var dayTot=0;keys.forEach(function(k){dayTot+=d.counts[k]||0});
    var wk=(d.dow==="Saturday"||d.dow==="Sunday");
    var tr='<tr'+(wk?' class="wkend"':'')+'><td style="color:var(--muted);font-size:12px">'+fmtDisplay(d.date)+'</td><td style="text-align:left">'+d.dow+'</td>';
    groups.forEach(function(g){
      var sub=0;
      g.cols.forEach(function(c,i){
        var v=d.counts[c.key]||0;sub+=v;
        tr+='<td'+(i===0?' class="grp"':'')+'><span class="ck-'+c.key+'">'+v+'</span></td>';
      });
      if(multiGroup)tr+='<td class="subtot">'+sub+'</td>';
    });
    tr+='<td class="grand grp">'+dayTot+'</td>';
    if(hasPrev){
      var pd=u.prevByDay[d.date],ptotDay=0;
      if(pd)keys.forEach(function(k){ptotDay+=pd[k]||0});
      tr+='<td>'+(pd?dHtml(dayTot,ptotDay):'<span class="up-d z">new</span>')+'</td>';
    }
    rows+=tr+'</tr>';
  });

  var trow='<tr class="uptotal"><td>TOTAL</td><td></td>';
  groups.forEach(function(g){
    var sub=0;
    g.cols.forEach(function(c,i){sub+=tot[c.key];trow+='<td'+(i===0?' class="grp"':'')+'>'+tot[c.key]+'</td>'});
    if(multiGroup)trow+='<td>'+sub+'</td>';
  });
  trow+='<td class="grp">'+gAll+'</td>'+(hasPrev?'<td>'+dHtml(gAll,pAll)+'</td>':'')+'</tr>';

  app.innerHTML='<div class="board">'+head+'<div class="up-body">'+cards+
    '<div class="up-scroll"><table class="up"><thead>'+h1+h2+'</thead><tbody>'+rows+trow+'</tbody></table></div>'+
    '</div>'+
    '<div class="footer">'+
      '<span>Live from ServiceTitan &middot; calls on the board by day and business unit &middot; canceled jobs excluded'+(hasPrev?' &middot; change vs '+fmtDate(u.prevDate)+' snapshot':' &middot; day-over-day changes appear tomorrow')+'</span>'+
      '<span>Weekends shaded &middot; Updated '+gen+'</span>'+
    '</div></div>'+
    (feedError?'<div class="feed-err">'+feedError+'</div>':'');
}

function nav(d){idx=(idx+d+ORDER.length)%ORDER.length;localStorage.setItem(TAB_KEY,ORDER[idx]);render()}
function goTo(i){idx=i;localStorage.setItem(TAB_KEY,ORDER[idx]);render()}

// ── data feed ──
async function fetchData(){
  try{
    var r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    data=await r.json();feedError=null;
  }catch(e){
    console.error(e);
    feedError=data?"Data feed temporarily unavailable - showing the last good pull.":"Data feed unavailable - try again in a minute.";
  }
}
async function refresh(){await Promise.all([fetchData(),loadSettings()]);render()}

// ── access gate (hosted mode only; same code as the Command Center) ──
const ACCESS_HASH="96a4dffa15e9fe46d7976f961f3c523639b220b1f3869853bcb05e712feb3bab";
const ACCESS_KEY="cc-access-v1";
async function sha256hex(s){
  var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return[...new Uint8Array(b)].map(function(x){return x.toString(16).padStart(2,"0")}).join("");
}
async function gate(){
  var isLocal=location.protocol!=="https:";
  if(isLocal||!window.isSecureContext)return true;
  localStorage.removeItem(ACCESS_KEY); // older versions cached the unlock forever
  if(sessionStorage.getItem(ACCESS_KEY)===ACCESS_HASH)return true; // session-scoped: code required again after the browser closes
  for(;;){
    var code=prompt("4 Day Call Board\n\nEnter access code:");
    if(code===null)continue;
    if(await sha256hex(code.trim())===ACCESS_HASH){sessionStorage.setItem(ACCESS_KEY,ACCESS_HASH);return true}
    alert("Wrong access code.");
  }
}
gate().then(refresh);
setInterval(refresh,REFRESH_MINUTES*60*1000);
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight")nav(1);
  else if(e.key==="ArrowLeft")nav(-1);
});
