<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Commission Audit — Comfort Advisors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;background:#f2f3f5;color:#111;min-height:100vh}
.wrap{max-width:1780px;margin:0 auto;padding:14px 22px 24px}
.topbar{display:flex;align-items:center;gap:14px;margin-bottom:12px;flex-wrap:wrap}
.big-title{font-size:36px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;line-height:1}
.big-title small{font-size:14px;font-weight:800;color:#888;margin-left:10px;letter-spacing:0}
.controls{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;align-items:center}
.tab{cursor:pointer;user-select:none;padding:8px 12px;border-radius:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#555;background:#e7e9ec;border:2px solid transparent;white-space:nowrap}
.tab:hover{color:#111;border-color:#c9ced6}
.tab.on{background:#1663c7;color:#fff}
select{font:inherit;font-size:12px;font-weight:800;padding:8px 10px;border-radius:8px;border:2px solid #e7e9ec;background:#fff;color:#333;cursor:pointer}
select.on{border-color:#1663c7;color:#1663c7}
.btn{cursor:pointer;border:0;background:#111;color:#fff;font:inherit;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;border-radius:8px}
.btn:hover{background:#333}

.kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:12px}
.kpi{background:#fff;border-radius:12px;padding:13px 14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kpi .v{font-size:26px;font-weight:900;line-height:1.05;letter-spacing:-.5px;white-space:nowrap}
.kpi .k{font-size:10.5px;font-weight:800;color:#8a919c;text-transform:uppercase;letter-spacing:.04em;margin-top:4px;line-height:1.2}
.kpi .s{font-size:10.5px;font-weight:700;color:#555;margin-top:4px;line-height:1.25}
.kpi.hero{background:#b42318}
.kpi.hero.ok{background:#15803d}
.kpi.hero .v,.kpi.hero .s{color:#fff}
.kpi.hero .k{color:rgba(255,255,255,.85)}
.pos{color:#b42318}.neg{color:#15803d}

.rule{display:flex;gap:10px;align-items:center;background:#111827;color:#fff;border-radius:12px;
  padding:10px 16px;margin-bottom:12px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.rule .tag{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#e0a421;white-space:nowrap;line-height:1.3}
.rule .b{flex:1;min-width:120px;text-align:center;font-size:11px;font-weight:700;color:#cbd5e1;line-height:1.25}
.rule .b b{display:block;font-size:15px;font-weight:900;color:#fff}
.rule .sep{color:#4b5563;font-weight:900}

.grid{display:grid;grid-template-columns:minmax(430px,1fr) 2.2fr;gap:12px;align-items:start}
.card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);min-width:0}
.t-head{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.t-title{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:-.3px}
.t-sub{font-size:10.5px;font-weight:700;color:#9aa1ab}
#search{margin-left:auto;border:2px solid #e7e9ec;border-radius:8px;padding:7px 10px;font:inherit;font-size:12px;font-weight:700;width:200px}
.tscroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;font-size:11.5px}
th{font-size:9.5px;font-weight:900;text-transform:uppercase;letter-spacing:.03em;color:#8a919c;
  text-align:right;padding:6px 7px;border-bottom:2px solid #e7e9ec;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;background:#fff;z-index:1}
th.l,td.l{text-align:left}
th.on{color:#1663c7}
td{padding:5px 7px;border-bottom:1px solid #f0f1f3;text-align:right;font-weight:700;white-space:nowrap}
td.red{color:#b42318}td.green{color:#15803d}
tr:hover td{background:#f7f9fc}
tr.tot td{border-top:2px solid #111;border-bottom:0;font-weight:900;background:#f5f6f8}
tr.sel td{background:#e7f0fc}
tr.click{cursor:pointer}
.chip{display:inline-block;font-size:9px;font-weight:800;border-radius:5px;padding:2px 6px;background:#e7e9ec;color:#555}
.chip.Costco{background:#fdeaea;color:#b42318}
.chip.TGL{background:#e7f0fc;color:#1663c7}
.chip.Marketed{background:#e8f6ec;color:#15803d}
.chip.Goodman{background:#f3e8ff;color:#6d28d9}
.fl{display:inline-block;font-size:8.5px;font-weight:900;border-radius:4px;padding:1.5px 5px;margin-left:3px;letter-spacing:.02em}
.fl.overpaid{background:#b42318;color:#fff}
.fl.underpaid{background:#b45309;color:#fff}
.fl.pm{background:#6d28d9;color:#fff}
.fl.d10{background:#fdeaea;color:#b42318;border:1px solid #f3c0bb}
.fl.other{background:#e7e9ec;color:#555}
td.typ{max-width:190px;overflow:hidden;text-overflow:ellipsis;color:#555}
td.disc{max-width:150px;overflow:hidden;text-overflow:ellipsis}
a.job{color:#1663c7;text-decoration:none}
a.job:hover{text-decoration:underline}

.footer{margin-top:12px;display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#999;flex-wrap:wrap;gap:6px}
.empty{padding:40px 0;text-align:center;font-size:15px;font-weight:800;color:#999}
.note{font-size:10.5px;font-weight:700;color:#9aa1ab;margin-top:8px;line-height:1.4}
@media(max-width:1500px){.kpis{grid-template-columns:repeat(4,1fr)}.grid{grid-template-columns:minmax(0,1fr)}}
@media(max-width:700px){.kpis{grid-template-columns:1fr 1fr}.big-title{font-size:24px}.controls{margin-left:0}}
@media print{
  body{background:#fff}
  .controls,.btn,#search,.footer{display:none}
  .wrap{padding:0;max-width:none}
  .kpi,.card,.rule{box-shadow:none;border:1px solid #ddd}
  .rule{background:#fff;color:#111}.rule .b{color:#333}.rule .b b{color:#111}.rule .tag{color:#b45309}
  table{font-size:9px}td,th{padding:3px 5px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="big-title">COMMISSION AUDIT<small id="t-sub">COMFORT ADVISORS · SIERRA</small></div>
    <div class="controls">
      <select id="periodSel" onchange="pickPeriod(this.value)"><option>Pay periods…</option></select>
      <div class="tab" id="tab-mtd" onclick="pickWin('mtd')">MTD</div>
      <div class="tab" id="tab-ytd" onclick="pickWin('ytd')">YTD</div>
      <button class="btn" onclick="exportCsv()">Export CSV</button>
      <button class="btn" onclick="window.print()">Print</button>
    </div>
  </div>
  <div id="board"><div class="empty">Waiting for data…</div></div>
  <div class="footer">
    <span id="updated"></span>
    <span id="note"></span>
  </div>
</div>
<script>
"use strict";
const RELOAD_MINS = 5;
let DATA = null, win = "mtd", periodIdx = -1, repFilter = null,
    sortCol = "variance", sortDir = -1, query = "";

const $ = id => document.getElementById(id);
const fmt = n => Math.round(n || 0).toLocaleString("en-US");
const money = n => "$" + fmt(n);
const money2 = n => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString("en-US", {minimumFractionDigits: 0, maximumFractionDigits: 0});
const moneyK = n => Math.abs(n) >= 1e6 ? "$" + (n/1e6).toFixed(2) + "M" : "$" + fmt(n/1e3) + "k";
const pct = (n, d=1) => (n*100).toFixed(d) + "%";

function winRange() {
  const today = new Date();
  const iso = d => d.toISOString().slice(0, 10);
  if (win === "period" && DATA.payPeriods[periodIdx])
    return [DATA.payPeriods[periodIdx].start, DATA.payPeriods[periodIdx].end];
  if (win === "mtd") {
    const s = new Date(today.getFullYear(), today.getMonth(), 1);
    return [`${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,"0")}-01`, iso(today)];
  }
  return [`${DATA.year}-01-01`, "9999-12-31"];
}
function winLabel() {
  if (win === "period") { const p = DATA.payPeriods[periodIdx]; return "Pay period " + fmtDay(p.start) + " – " + fmtDay(p.end); }
  return win === "mtd" ? "Month to date" : "Year to date";
}
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmtDay = s => MONTHS[parseInt(s.slice(5,7),10)-1] + " " + parseInt(s.slice(8,10),10);

function winJobs() {
  const [a, b] = winRange();
  return DATA.jobs.filter(j => j.date >= a && j.date <= b);
}

function agg(jobs) {
  const s = {n: jobs.length, sold: 0, book: 0, discLines: 0, manip: 0,
             expected: 0, paid: 0, adj: 0, variance: 0, over: 0, overSum: 0,
             under: 0, underSum: 0, flagged: 0};
  for (const j of jobs) {
    s.sold += j.sold; s.book += j.book;
    s.discLines += j.discLines + (j.writeOff || 0);
    s.manip += Math.max(0, j.book - j.list);
    s.expected += j.expected; s.paid += j.paid; s.adj += j.adj;
    s.variance += j.variance;
    if (j.flags.includes("overpaid")) { s.over++; s.overSum += j.variance; }
    if (j.flags.includes("underpaid")) { s.under++; s.underSum += j.variance; }
    if (j.flags.length) s.flagged++;
  }
  s.discPct = s.book > 0 ? Math.max(0, (s.book - s.sold) / s.book) : 0;
  s.effRate = s.sold > 0 ? (s.paid + s.adj) / s.sold : 0;
  s.expRate = s.sold > 0 ? s.expected / s.sold : 0;
  return s;
}

function kpisHtml(s) {
  const ok = s.variance <= s.n; // less than ~$1/job either way
  return `<div class="kpis">
    <div class="kpi hero ${ok ? "ok" : ""}"><div class="v">${money2(s.variance)}</div>
      <div class="k">Commission variance</div>
      <div class="s">paid + adjustments vs plan · ${ok ? "on plan" : "overpaid"}</div></div>
    <div class="kpi"><div class="v pos">${money2(s.overSum)}</div><div class="k">Overpaid</div>
      <div class="s">${s.over} of ${s.n} jobs paid above plan</div></div>
    <div class="kpi"><div class="v neg">${money2(s.underSum)}</div><div class="k">Underpaid</div>
      <div class="s">${s.under} jobs paid below plan</div></div>
    <div class="kpi"><div class="v">${moneyK(s.sold)}</div><div class="k">Net sales</div>
      <div class="s">${s.n} commissioned jobs · book ${moneyK(s.book)}</div></div>
    <div class="kpi"><div class="v">${pct(s.discPct)}</div><div class="k">Avg discount off book</div>
      <div class="s">codes ${moneyK(s.discLines)} · price cuts ${moneyK(s.manip)}</div></div>
    <div class="kpi"><div class="v">${money(s.expected)}</div><div class="k">Commission per plan</div>
      <div class="s">${pct(s.expRate, 2)} effective plan rate</div></div>
    <div class="kpi"><div class="v">${money(s.paid + s.adj)}</div><div class="k">Commission paid</div>
      <div class="s">${money(s.paid)} paid ${s.adj ? "· " + money2(s.adj) + " adjustments" : ""} · ${pct(s.effRate, 2)} effective</div></div>
  </div>`;
}

function ruleHtml() {
  return `<div class="rule">
    <span class="tag">The pay policy<br>rate by category</span>
    <div class="b"><b>10%</b>straight Sierra</div>
    <div class="b"><b>8%</b>TGL / LTO</div>
    <div class="b"><b>7%</b>Costco</div>
    <div class="b"><b>5%</b>Goodman (flat)</div>
    <span class="sep">then the discount ding:</span>
    <div class="b"><b>0–5% off</b>full rate</div>
    <div class="b"><b>6–8% off</b>−1 point</div>
    <div class="b"><b>9% off</b>−2 points</div>
    <div class="b"><b>10%+ off</b>flat 5%</div>
    <span class="sep">·</span>
    <div class="b"><b>discount</b>= book − net sale<br>(codes, cuts &amp; write-offs)</div>
    <div class="b" style="flex:1.4"><b>Sales Manager discretion</b>variances are review items,<br>not automatic errors</div>
  </div>`;
}

function repsHtml(jobs) {
  const by = {};
  for (const j of jobs) {
    const r = by[j.repId] || (by[j.repId] = {name: j.rep, jobs: [], id: j.repId});
    r.jobs.push(j);
  }
  const rows = Object.values(by).map(r => ({...r, ...agg(r.jobs)}))
    .sort((a, b) => b.variance - a.variance);
  const S = agg(jobs);
  return `<div class="card">
    <div class="t-head"><span class="t-title">By rep</span>
      <span class="t-sub">click a rep to filter the job list</span></div>
    <div class="tscroll"><table>
      <thead><tr><th class="l">Rep</th><th>Jobs</th><th>Sales</th><th>Disc%</th>
        <th>Plan</th><th>Paid+Adj</th><th>Variance</th><th>Over</th></tr></thead>
      <tbody>
      ${rows.map(r => `<tr class="click ${repFilter === r.id ? "sel" : ""}" onclick="pickRep(${r.id})">
        <td class="l">${r.name}</td><td>${r.n}</td><td>${fmt(r.sold)}</td>
        <td>${pct(r.discPct)}</td><td>${fmt(r.expected)}</td><td>${fmt(r.paid + r.adj)}</td>
        <td class="${r.variance > r.n ? "red" : "green"}">${money2(r.variance)}</td>
        <td>${r.over || "—"}</td></tr>`).join("")}
      <tr class="tot"><td class="l">DEPARTMENT</td><td>${S.n}</td><td>${fmt(S.sold)}</td>
        <td>${pct(S.discPct)}</td><td>${fmt(S.expected)}</td><td>${fmt(S.paid + S.adj)}</td>
        <td class="${S.variance > S.n ? "red" : "green"}">${money2(S.variance)}</td>
        <td>${S.over}</td></tr>
      </tbody></table></div>
    <div class="note">Plan = rate the pay plan calls for after the discount ding · Paid+Adj = payroll
      commission items plus manual Direct Adjustments (the clawbacks) · a red variance is money paid
      above plan.</div>
  </div>`;
}

const FLAG_LABEL = {overpaid: ["OVER", "overpaid"], underpaid: ["UNDER", "underpaid"],
  "price-manip": ["PRICE CUT", "pm"], "disc>10": [">10%", "d10"],
  "activity-mismatch": ["WRONG RATE TYPE", "other"], "multi-rep": ["SPLIT", "other"],
  "adj-only": ["ADJ ONLY", "other"], "no-invoice": ["NO INVOICE", "other"],
  reversal: ["REVERSED", "other"], recent: ["⏳ NEW", "other"]};

const COLS = [
  ["date","Date","l"],["id","Job #",""],["rep","Rep","l"],["bucket","Class","l"],
  ["type","Job Type","l"],["book","Book",""],["sold","Sold",""],
  ["discPct","Disc %",""],["codes","Codes/Credits",""],["manip","Price Cut",""],
  ["expRate","Plan Rate",""],["expected","Plan $",""],["paid","Paid",""],
  ["adj","Adj",""],["variance","Variance",""],["flags","Flags","l"]];

function jobsHtml(jobs) {
  const q = query.toLowerCase();
  let rows = jobs.map(j => ({...j, manip: Math.max(0, j.book - j.list),
                             codes: j.discLines + (j.writeOff || 0)}));
  if (repFilter) rows = rows.filter(j => j.repId === repFilter ||
    (j.reps || []).some(r => r.id === repFilter));
  if (q) rows = rows.filter(j =>
    (j.rep + " " + j.type + " " + j.id + " " + j.discNames.join(" ")).toLowerCase().includes(q));
  rows.sort((a, b) => {
    const va = a[sortCol] ?? "", vb = b[sortCol] ?? "";
    return (typeof va === "string" ? va.localeCompare(vb) : va - vb) * (sortCol === "flags" ? 1 : sortDir);
  });
  const S = agg(rows);
  return `<div class="card">
    <div class="t-head">
      <span class="t-title">Job by job${repFilter ? " — " + (rows[0]?.rep || "") : ""}</span>
      <span class="t-sub">${rows.length} jobs · sorted by ${sortCol} · click a job # to open it in ServiceTitan</span>
      ${repFilter ? `<span class="tab on" onclick="pickRep(null)">✕ clear rep</span>` : ""}
      <input id="search" placeholder="Search rep, type, discount code…" value="${query.replace(/"/g,"&quot;")}">
    </div>
    <div class="tscroll"><table>
      <thead><tr>${COLS.map(([k, label, cls]) =>
        `<th class="${cls}${sortCol===k?" on":""}" onclick="sortBy('${k}')">${label}${sortCol===k?(sortDir>0?" ▲":" ▼"):""}</th>`).join("")}</tr></thead>
      <tbody>
      ${rows.map(j => `<tr>
        <td class="l">${j.date.slice(5)}</td>
        <td><a class="job" href="https://go.servicetitan.com/#/Job/Index/${j.id}" target="_blank" rel="noopener">${j.id}</a></td>
        <td class="l">${j.rep}${(j.reps||[]).length > 1 ? " +" + ((j.reps.length)-1) : ""}</td>
        <td class="l"><span class="chip ${j.bucket}">${j.bucket}</span></td>
        <td class="l typ" title="${j.type}">${j.type}</td>
        <td>${fmt(j.book)}</td><td><b>${fmt(j.sold)}</b></td>
        <td class="${j.discPct > .10 ? "red" : ""}">${pct(j.discPct)}</td>
        <td class="disc" title="${j.discNames.join(", ")}">${j.codes > 0.5 ? fmt(j.codes) : "—"}</td>
        <td class="${j.manip > 50 ? "red" : ""}">${j.manip > 0.5 ? fmt(j.manip) : "—"}</td>
        <td>${pct(j.expRate, 0)}</td><td>${fmt(j.expected)}</td>
        <td>${fmt(j.paid)}</td><td class="${j.adj < 0 ? "green" : ""}">${j.adj ? fmt(j.adj) : "—"}</td>
        <td class="${j.variance > 1 ? "red" : j.variance < -1 ? "green" : ""}"><b>${money2(j.variance)}</b></td>
        <td class="l">${j.flags.map(f => { const [t, c] = FLAG_LABEL[f] || [f, "other"];
          return `<span class="fl ${c}">${t}</span>`; }).join("")}</td>
      </tr>`).join("")}
      <tr class="tot"><td class="l">TOTAL</td><td></td><td class="l">${rows.length} jobs</td><td></td><td class="l"></td>
        <td>${fmt(S.book)}</td><td>${fmt(S.sold)}</td><td>${pct(S.discPct)}</td>
        <td>${fmt(S.discLines)}</td><td>${fmt(S.manip)}</td><td>${pct(S.expRate, 2)}</td>
        <td>${fmt(S.expected)}</td><td>${fmt(S.paid)}</td><td>${fmt(S.adj)}</td>
        <td class="${S.variance > S.n ? "red" : "green"}">${money2(S.variance)}</td><td></td></tr>
      </tbody></table></div>
  </div>`;
}

function render() {
  if (!DATA) return;
  const jobs = winJobs();
  const s = agg(jobs);
  $("t-sub").textContent = "COMFORT ADVISORS · SIERRA · " + winLabel().toUpperCase();
  $("board").innerHTML = kpisHtml(s) + ruleHtml() +
    `<div class="grid">${repsHtml(jobs)}${jobsHtml(jobs)}</div>`;
  wireSearch();
  $("tab-mtd").classList.toggle("on", win === "mtd");
  $("tab-ytd").classList.toggle("on", win === "ytd");
  $("periodSel").classList.toggle("on", win === "period");
  const un = DATA.unlinkedAdjustments || [];
  $("updated").textContent = "Updated " + DATA.updated + " (live ServiceTitan API)" +
    (un.length ? ` · ${un.length} adjustments not tied to a job (${money2(un.reduce((t,a)=>t+a.amount,0))}) — check payroll directly` : "");
  $("note").textContent = "Book price = today's pricebook · commission base = net sale (matches how payroll computes it)";
}

function wireSearch() {
  const inp = $("search");
  if (!inp) return;
  inp.oninput = () => { query = inp.value; renderJobsOnly(); };
}
function renderJobsOnly() {
  const cards = document.querySelectorAll(".grid > .card");
  if (cards.length < 2) return render();
  const tmp = document.createElement("div");
  tmp.innerHTML = jobsHtml(winJobs());
  cards[1].replaceWith(tmp.firstElementChild);
  wireSearch();
  const inp = $("search");
  inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length);
}

function sortBy(k) {
  if (sortCol === k) sortDir = -sortDir;
  else { sortCol = k; sortDir = ["date","rep","bucket","type","flags"].includes(k) ? 1 : -1; }
  renderJobsOnly();
}
function pickWin(w) { win = w; periodIdx = -1; $("periodSel").selectedIndex = 0; render(); }
function pickPeriod(v) { if (v === "") return; periodIdx = +v; win = "period"; render(); }
function pickRep(id) { repFilter = repFilter === id ? null : id; render(); }

function buildPeriods() {
  $("periodSel").innerHTML = `<option value="">Pay periods…</option>` +
    DATA.payPeriods.map((p, i) =>
      `<option value="${i}">${fmtDay(p.start)} – ${fmtDay(p.end)}</option>`).join("");
}

function exportCsv() {
  const jobs = winJobs().map(j => ({...j, manip: Math.max(0, j.book - j.list),
                                    codes: j.discLines + (j.writeOff || 0)}));
  const esc = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const lines = [COLS.map(([,l]) => esc(l)).join(",") + ",Discount Codes"];
  for (const j of jobs) {
    lines.push(COLS.map(([k]) => {
      if (k === "flags") return esc(j.flags.join(" "));
      if (k === "discPct" || k === "expRate") return (j[k]*100).toFixed(2) + "%";
      return typeof j[k] === "number" ? j[k] : esc(j[k]);
    }).join(",") + "," + esc(j.discNames.join("; ")));
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([lines.join("\r\n")], {type: "text/csv"}));
  a.download = `commission-audit-${winLabel().replace(/\s+/g, "-").toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function load() {
  try {
    const r = await fetch("data.json?" + Date.now());
    if (!r.ok) throw new Error(r.status);
    DATA = await r.json();
    buildPeriods();
    render();
  } catch (e) {
    if (!DATA) $("board").innerHTML = `<div class="empty">Could not load data.json (${e.message})</div>`;
  }
}
setInterval(load, RELOAD_MINS * 60 * 1000);

// ── Access gate (hosted mode only) ─────────────────────────────────────────
// This board has its OWN access code (pay data - tighter circle than the
// shared board code). SHA-256 of the code; never put the code itself here.
const ACCESS_HASH = "d44da9d786a4244d213a3a9a5d6489f4253ffafa611dc3027e78f6f3de7e89e2";
const ACCESS_KEY = "ca-pay-access-v1";   // separate from the shared cc-access-v1 unlock
async function sha256hex(s){
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, "0")).join("");
}
async function gate(){
  const local = location.protocol === "file:" || ["localhost","127.0.0.1"].includes(location.hostname);
  if (local || !window.isSecureContext) return true;
  if (sessionStorage.getItem(ACCESS_KEY) === ACCESS_HASH) return true;
  for (;;) {
    const code = prompt("Commission Audit Board\n\nEnter access code:");
    if (code === null) continue;
    if (await sha256hex(code.trim()) === ACCESS_HASH) {
      sessionStorage.setItem(ACCESS_KEY, ACCESS_HASH);
      return true;
    }
    alert("Wrong access code.");
  }
}
// ── deploy watcher: open viewers re-fetch this page every few minutes; any
// push reloads them, and a changed access code kicks them back to the prompt ──
(function(){
  var baseline=null;
  function pageHash(t){var m=t.match(/ACCESS_HASH\s*=\s*"([0-9a-f]{64})"/);return m?m[1]:null}
  async function checkDeploy(){
    try{
      var r=await fetch("index.html?ts="+Date.now(),{cache:"no-store"});
      if(!r.ok)return;
      var t=await r.text();
      if(baseline===null){baseline=t;return}
      if(t===baseline)return;
      if(pageHash(t)!==ACCESS_HASH)sessionStorage.removeItem(ACCESS_KEY);
      location.reload();
    }catch(e){}
  }
  checkDeploy();setInterval(checkDeploy,5*60*1000);
})();
gate().then(load);
</script>
