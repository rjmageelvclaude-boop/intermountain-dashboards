<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CASPR</title>
<style>
:root{
  --page:#f4f6f9; --surface:#ffffff; --surface2:#f1f3f7; --ink:#17212f; --muted:#687382; --faint:#98a2b3;
  --hair:#e4e8ef; --hair2:#d5dbe5;
  --good:#157a4c; --good-bg:#e3f3ea; --bad:#bb3540; --bad-bg:#fae8ea; --warn:#9a6700; --warn-bg:#fdf3d7;
  --bar-track:#e9edf3; --zebra:#f8fafc; --wkend:#fdf7ea;
  --c-turn:#1d4ed8; --c-mark:#b45309; --c-cost:#0e7490; --c-self:#6d28d9;
}
:root[data-theme="dark"]{
  --page:#0b1120; --surface:#131b2b; --surface2:#1a2438; --ink:#eaeff7; --muted:#93a0b4; --faint:#6d7a90;
  --hair:rgba(255,255,255,.08); --hair2:rgba(255,255,255,.16);
  --good:#4bd695; --good-bg:rgba(75,214,149,.13); --bad:#ff858e; --bad-bg:rgba(255,133,142,.12);
  --warn:#f0b268; --warn-bg:rgba(240,178,104,.12);
  --bar-track:rgba(255,255,255,.10); --zebra:rgba(255,255,255,.025); --wkend:rgba(240,178,104,.07);
  --c-turn:#8ab4ff; --c-mark:#f0b268; --c-cost:#67d3e8; --c-self:#c4a5ff;
}
:root[data-co="sierra"]{--accent:#24408e;--accent-ink:#fff;--tint:rgba(36,64,142,.06);--tint2:rgba(36,64,142,.12)}
:root[data-co="ultimate"]{--accent:#6d28d9;--accent-ink:#fff;--tint:rgba(109,40,217,.06);--tint2:rgba(109,40,217,.12)}
:root[data-co="russett"]{--accent:#b91c1c;--accent-ink:#fff;--tint:rgba(185,28,28,.06);--tint2:rgba(185,28,28,.12)}
:root[data-theme="dark"][data-co="sierra"]{--accent:#7db2ff;--accent-ink:#0b1120;--tint:rgba(125,178,255,.08);--tint2:rgba(125,178,255,.18)}
:root[data-theme="dark"][data-co="ultimate"]{--accent:#c4a5ff;--accent-ink:#0b1120;--tint:rgba(196,165,255,.08);--tint2:rgba(196,165,255,.18)}
:root[data-theme="dark"][data-co="russett"]{--accent:#ff8f96;--accent-ink:#0b1120;--tint:rgba(255,143,150,.08);--tint2:rgba(255,143,150,.18)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--page);color:var(--ink);min-height:100vh}
.wrap{width:100%;margin:0 auto;padding:18px 22px 34px}
.board{background:var(--surface);border:1px solid var(--hair);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(13,25,45,.05)}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 22px 12px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
.wordmark{font-size:20px;font-weight:800;letter-spacing:.02em;white-space:nowrap}
.wordmark small{display:block;font-size:10px;font-weight:600;color:var(--faint);letter-spacing:.14em;text-transform:uppercase}
.tabs{display:flex;gap:3px;background:var(--tint);padding:4px;border-radius:10px;flex-wrap:wrap}
.tabs.co-tabs{margin-left:auto}
.tab{font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;user-select:none}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--accent);color:var(--accent-ink);font-weight:700}
.updated{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);white-space:nowrap}
.updated .pulse{width:7px;height:7px;border-radius:50%;background:var(--good);animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion: reduce){.updated .pulse{animation:none}}
.theme-btn{border:1px solid var(--hair2);background:transparent;color:var(--muted);font-size:13px;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit}
.theme-btn:hover{color:var(--ink)}
.theme-btn:focus-visible,.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.subbar{display:flex;align-items:center;gap:10px;padding:10px 22px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
select.daypick{border:1px solid var(--hair2);background:var(--surface);color:var(--ink);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 9px;border-radius:8px}
.body{padding:18px 22px 10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--hair);border-radius:12px;padding:14px 16px;border-top:3px solid var(--accent)}
.card .c-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:6px}
.card .c-val{font-size:30px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.card .c-sub{font-size:11.5px;margin-top:7px;font-weight:600;color:var(--faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.capbar{height:6px;border-radius:3px;background:var(--bar-track);margin-top:9px;position:relative;overflow:hidden}
.capbar i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:var(--accent)}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.chip.up{color:var(--good);background:var(--good-bg)}
.chip.down{color:var(--bad);background:var(--bad-bg)}
.chip.flat{color:var(--warn);background:var(--warn-bg)}
.sect{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:18px 2px 9px}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tbl-scroll{overflow-x:auto;border:1px solid var(--hair);border-radius:10px;margin-bottom:16px}
table.g{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.g th,table.g td{padding:9px 13px;text-align:right;font-weight:600;border-bottom:1px solid var(--hair);white-space:nowrap;font-variant-numeric:tabular-nums}
table.g thead th{background:var(--surface2);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);position:sticky;top:0;z-index:2}
table.g th:first-child,table.g td:first-child{text-align:left;padding-left:15px}
table.g tbody tr:nth-child(even):not(.tot) td{background:var(--zebra)}
table.g tbody tr.wkend td{background:var(--wkend)}
table.g tbody tr:hover td{background:var(--tint)}
table.g tbody tr:last-child td{border-bottom:none}
table.g tr.tot td{background:var(--surface2);font-weight:800;border-top:1px solid var(--hair2)}
table.g .grp{border-left:1px solid var(--hair2)}
table.g .dim{color:var(--faint)}
.tt-turn{color:var(--c-turn)}.tt-mark{color:var(--c-mark)}.tt-cost{color:var(--c-cost)}.tt-self{color:var(--c-self)}
.rankn{display:inline-block;min-width:22px;color:var(--faint);font-size:11.5px;font-weight:700}
.rbar{display:inline-block;vertical-align:middle;height:7px;border-radius:3px;background:var(--bar-track);width:90px;margin-left:10px;position:relative;overflow:hidden}
.rbar i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:var(--accent)}
.trend{font-size:12px;font-weight:800}
.trend.p{color:var(--good)}.trend.n{color:var(--bad)}.trend.z{color:var(--faint)}
.edit{cursor:pointer}
.edit:hover{outline:2px dashed var(--accent);outline-offset:-2px;border-radius:6px}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:14px}
.setup-box{background:var(--surface);border:1px solid var(--hair);border-radius:10px;overflow:hidden}
.setup-box h3{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:10px 14px 6px}
.setup-box .row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--hair);font-size:13.5px;font-weight:600}
.setup-box .row span:first-child{color:var(--muted)}
.setup-box .row b{font-variant-numeric:tabular-nums}
.footer{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:10px 22px 12px;font-size:11px;font-weight:500;color:var(--faint);border-top:1px solid var(--hair)}
.feed-err{margin-top:10px;font-size:12px;font-weight:700;color:var(--bad)}
.dash{color:var(--faint)}
@media(min-width:1750px){
  .card .c-val{font-size:36px}
  table.g{font-size:15.5px}
  .tab{font-size:14px;padding:8px 16px}
  .wordmark{font-size:23px}
}
@media(max-width:980px){.duo{grid-template-columns:1fr}}
@media(max-width:700px){
  .wrap{padding:12px 8px 28px}
  .topbar{padding:12px 12px 10px;gap:8px}
  .tabs.co-tabs{margin-left:0;width:100%;order:5}
  .body{padding:12px 10px 6px}
  .card .c-val{font-size:22px}
  table.g{font-size:12.5px}
  table.g th,table.g td{padding:7px 8px}
  .rbar{width:44px;margin-left:6px}
  .footer{padding:10px 12px}
}
</style>
</head>
<body>
<div class="wrap" id="app">
<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:var(--faint)"><div style="text-align:center"><div style="font-size:32px;margin-bottom:12px">&#128202;</div><div style="font-size:14px;font-weight:600">Loading CASPR...</div></div></div>
</div>
<script>
// Monthly plan inputs (workdays, budgeted calls, close % and average tickets
// per lead type) are shared for all viewers through the same PIN-protected
// Apps Script store the Command Center uses, namespaced under co="comfort".
const BUDGET_URL="https://script.google.com/macros/s/AKfycby-J4xARcDQoDUwSfX6qsjYnM_QZyDfhd09WVBQXomJkLsrDysnkw-L0EZu0_S9Q4kz-w/exec";
const DATA_URL="data.json";
const REFRESH_MINUTES=5;
const TREND_DAYS=3;          // trend arrows compare the last N full days to the N before

const PIN_KEY="pcc-pin";
const LS_KEY="cr-settings-v1";
const CO_KEY="cr-co-v1";
const VIEW_KEY="cr-view-v1";
const THEME_KEY="cr-theme";
const COS=["sierra","ultimate","russett"];
const VIEWS=[["score","Scoreboard"],["adv","Advisors"],["turn","Turnovers"],["setup","Monthly Setup"]];
const TYPES=[["turnover","Turnover","turn"],["marketed","Marketed","mark"],["costco","Costco","cost"],["selfgen","Self-Gen","self"]];

const PLAN_FIELDS=[
  ["workdays","Budgeted work days"],
  ["svcCalls","Budgeted service calls"],
  ["toRate","Planned turnover rate %"],
  ["mktLeads","Marketed leads budgeted"],
  ["costcoLeads","Costco leads budgeted"],
  ["selfLeads","Self-gen leads budgeted"],
  ["closeTurn","Turnover close %"],
  ["closeMkt","Marketed close %"],
  ["closeCostco","Costco close %"],
  ["closeSelf","Self-gen close %"],
  ["avgTurn","Turnover avg ticket $"],
  ["avgMkt","Marketed avg ticket $"],
  ["avgCostco","Costco avg ticket $"],
  ["avgSelf","Self-gen avg ticket $"],
];

let data=null,settings=JSON.parse(localStorage.getItem(LS_KEY)||"{}"),synced=false,feedError=null;
let co=localStorage.getItem(CO_KEY);if(COS.indexOf(co)<0)co="sierra";
let view=localStorage.getItem(VIEW_KEY);if(!VIEWS.some(function(v){return v[0]===view}))view="score";
let day="mtd"; // "mtd" or "YYYY-MM-DD"

function applyTheme(t){document.documentElement.setAttribute("data-theme",t);localStorage.setItem(THEME_KEY,t)}
applyTheme(localStorage.getItem(THEME_KEY)||(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");render()}

// ── shared settings (Apps Script) ──
async function post(body){
  var r=await fetch(BUDGET_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return r.json();
}
async function loadSettings(){
  try{
    var j=await post({action:"getBudgets"});
    if(j&&j.ok){settings=(j.budgets&&j.budgets.comfort)||{};synced=true;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
  }catch(e){console.warn("Shared inputs unavailable - using this device's saved values",e)}
}
async function saveSetting(key,value){
  settings[key]=value;localStorage.setItem(LS_KEY,JSON.stringify(settings));render();
  if(!synced)return;
  var pin=localStorage.getItem(PIN_KEY)||prompt("Enter the PIN to save shared plan inputs:");
  if(!pin)return;
  try{
    var j=await post({action:"setBudget",pin:pin,co:"comfort",key:key,value:value});
    if(j&&j.ok){localStorage.setItem(PIN_KEY,pin);settings=(j.budgets&&j.budgets.comfort)||settings;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
    else if(j&&j.error==="bad-pin"){localStorage.removeItem(PIN_KEY);alert("Wrong PIN - change was NOT saved for other viewers.")}
    else{alert("Could not save shared input: "+((j&&j.error)||"unknown error"))}
  }catch(e){alert("Could not reach the settings server - change saved on this device only.")}
  render();
}
function plan(field){
  var v=settings[co+"|"+(data?data.month:"")+"|"+field];
  return(v===undefined||v===""||isNaN(Number(v)))?null:Number(v);
}
function editPlan(field,label){
  var cur=plan(field);
  var v=prompt(label+" - "+co.charAt(0).toUpperCase()+co.slice(1)+", "+monthName()+":",cur===null?"":cur);
  if(v===null)return;
  v=v.trim();
  if(v!==""&&isNaN(Number(v))){alert("Enter a number.");return}
  saveSetting(co+"|"+data.month+"|"+field,v===""?"":Number(v));
}

// ── helpers ──
function fmt$(v){return"$"+Math.round(v).toLocaleString()}
function fmt$0(v){return v?fmt$(v):'<span class="dash">&mdash;</span>'}
function pct(n,d){return d?Math.round(n/d*100)+"%":'<span class="dash">&mdash;</span>'}
function n0(v){return v?v:'<span class="dash">&mdash;</span>'}
function monthName(){
  if(!data)return"";
  var p=data.month.split("-");
  return new Date(p[0],p[1]-1,1).toLocaleString("default",{month:"long",year:"numeric"});
}
function fmtDay(iso){var p=iso.split("-");return parseInt(p[1])+"/"+parseInt(p[2])}
function dowOf(iso){return new Date(iso+"T12:00:00").toLocaleString("default",{weekday:"short"})}
function isWkend(iso){var d=new Date(iso+"T12:00:00").getDay();return d===0||d===6}
function B(){return data.companies[co]}
function chip(v,fmt){
  var cls=v>0?"up":v<0?"down":"flat";
  var s=(v>0?"+":"")+(fmt?fmt(v):v);
  return'<span class="chip '+cls+'">'+s+'</span>';
}

// ── 3-day trend arrows ──
// One entry per calendar day with any activity: {leads, sold, revenue, turns}
function dailySeries(){
  var b=B(),out={};
  Object.keys(b.advisorDaily).forEach(function(d){
    var t={leads:0,sold:0,revenue:0,turns:0};
    var cells=b.advisorDaily[d];
    Object.keys(cells).forEach(function(cid){
      TYPES.forEach(function(ty){
        var x=cells[cid][ty[0]];
        if(x){t.leads+=x[0];t.sold+=x[1];t.revenue+=x[2]}
      });
    });
    out[d]=t;
  });
  Object.keys(b.techDaily).forEach(function(d){
    var t=out[d]=out[d]||{leads:0,sold:0,revenue:0,turns:0};
    var cells=b.techDaily[d];
    Object.keys(cells).forEach(function(tid){
      t.turns+=(cells[tid].codTurn||0)+(cells[tid].maintTurn||0);
    });
  });
  return out;
}
// company-active full days (before today), the shared clock for every trend
function activeDays(){
  var b=B(),series=dailySeries();
  return Object.keys(series).filter(function(d){return d<b.today&&(series[d].leads||series[d].turns)}).sort();
}
// compare avg of getVal over the last N active days vs the N before them
function trendCalc(getVal){
  var days=activeDays();
  if(days.length<TREND_DAYS+1)return null;
  var recent=days.slice(-TREND_DAYS),prior=days.slice(-TREND_DAYS*2,-TREND_DAYS);
  if(!prior.length)return null;
  function avg(list){var s=0;list.forEach(function(d){s+=getVal(d)});return s/list.length}
  var a=avg(recent),p=avg(prior);
  if(p===0&&a===0)return{dir:0,pct:0,quiet:true};
  if(p===0)return{dir:1,pct:null};
  var ch=(a-p)/p*100;
  return{dir:ch>2?1:ch<-2?-1:0,pct:Math.abs(Math.round(ch))};
}
function trendHtml(t,label){
  if(!t)return"";
  if(t.quiet)return'<span class="dash">&mdash;</span>';
  var arrow=t.dir>0?"&#9650;":t.dir<0?"&#9660;":"&#9654;";
  var cls=t.dir>0?"up":t.dir<0?"down":"flat";
  var txt=t.pct===null?"new":(t.dir===0?"steady":(t.pct+"%"));
  return'<span class="chip '+cls+'" title="'+label+': last '+TREND_DAYS+' days vs the '+TREND_DAYS+' before">'+arrow+' '+txt+'</span>';
}
function trendOf(metric){
  var series=dailySeries();
  var f={
    revenue:function(x){return x.revenue},
    leads:function(x){return x.leads},
    close:function(x){return x.leads?x.sold/x.leads:0},
    turns:function(x){return x.turns},
  }[metric];
  return trendCalc(function(d){return f(series[d])});
}
function trendChip(metric,label){
  var t=trendOf(metric);
  return t&&!t.quiet?trendHtml(t,label):"";
}
// one advisor's revenue on a day (all lead types)
function advisorDayRev(id){
  var b=B();
  return function(d){
    var cell=(b.advisorDaily[d]||{})[String(id)];
    if(!cell)return 0;
    var s=0;
    TYPES.forEach(function(t){if(cell[t[0]])s+=cell[t[0]][2]});
    return s;
  };
}
// one tech's turnovers created on a day
function techDayTurns(id){
  var b=B();
  return function(d){
    var c=(b.techDaily[d]||{})[String(id)];
    return c?(c.codTurn||0)+(c.maintTurn||0):0;
  };
}

// planned monthly expectations: leads x close% x avg ticket
function planCalc(){
  var svc=plan("svcCalls"),to=plan("toRate");
  var leads={turnover:svc!==null&&to!==null?svc*to/100:null,
             marketed:plan("mktLeads"),costco:plan("costcoLeads"),selfgen:plan("selfLeads")};
  var close={turnover:plan("closeTurn"),marketed:plan("closeMkt"),costco:plan("closeCostco"),selfgen:plan("closeSelf")};
  var avg={turnover:plan("avgTurn"),marketed:plan("avgMkt"),costco:plan("avgCostco"),selfgen:plan("avgSelf")};
  var out={types:{},revenue:null,sales:null};
  TYPES.forEach(function(t){
    var k=t[0],l=leads[k],c=close[k],a=avg[k];
    var sales=(l!==null&&c!==null)?l*c/100:null;
    var rev=(sales!==null&&a!==null)?sales*a:null;
    out.types[k]={leads:l,close:c,avg:a,sales:sales,revenue:rev};
    if(rev!==null){out.revenue=(out.revenue||0)+rev}
    if(sales!==null){out.sales=(out.sales||0)+sales}
  });
  return out;
}
// Mon-Sat days elapsed (through today) and in the whole month - the pace clock
function workdayClock(){
  var b=B(),p=data.month.split("-"),y=+p[0],m=+p[1];
  var today=+b.today.split("-")[2],total=b.monthDays,el=0,all=0;
  for(var d=1;d<=total;d++){
    var dow=new Date(y,m-1,d).getDay();
    if(dow!==0){all++;if(d<=today)el++}
  }
  var budget=plan("workdays");
  if(budget!==null&&budget>0){el=Math.min(el,budget);all=budget}
  return{elapsed:el,total:all};
}

// MTD totals by type for the company (sums the advisor rows)
function mtdTotals(){
  var b=B(),out={},tot={leads:0,sold:0,revenue:0};
  TYPES.forEach(function(t){out[t[0]]={leads:0,sold:0,revenue:0}});
  b.advisors.forEach(function(a){
    TYPES.forEach(function(t){
      var x=a.types[t[0]];
      out[t[0]].leads+=x.leads;out[t[0]].sold+=x.sold;out[t[0]].revenue+=x.revenue;
    });
    tot.leads+=a.total.leads;tot.sold+=a.total.sold;tot.revenue+=a.total.revenue;
  });
  out._total=tot;
  return out;
}
// per-advisor numbers for one day (from advisorDaily) shaped like the MTD rows
function advisorsForDay(iso){
  var b=B(),d=b.advisorDaily[iso]||{};
  return b.advisors.map(function(a){
    var cell=d[String(a.id)]||{};
    var types={},tot={leads:0,sold:0,revenue:0};
    TYPES.forEach(function(t){
      var x=cell[t[0]]||[0,0,0];
      types[t[0]]={leads:x[0],sold:x[1],revenue:x[2]};
      tot.leads+=x[0];tot.sold+=x[1];tot.revenue+=x[2];
    });
    return{id:a.id,name:a.name,types:types,total:tot};
  }).filter(function(a){return a.total.leads||a.total.sold||a.total.revenue})
    .sort(function(x,y){return y.total.revenue-x.total.revenue||y.total.leads-x.total.leads});
}
const T_FIELDS=["codOpp","maintOpp","ropps","codTurn","maintTurn","codRan","maintRan","codSold","codRev","maintSold","maintRev"];
function techsForDay(iso){
  var b=B(),d=b.techDaily[iso]||{};
  var byId={};b.techs.forEach(function(t){byId[String(t.id)]=t.name});
  return Object.keys(d).map(function(tid){
    var row={id:tid,name:byId[tid]||tid};
    T_FIELDS.forEach(function(f){row[f]=d[tid][f]||0});
    row.opps=row.codOpp+row.maintOpp;row.turns=row.codTurn+row.maintTurn;
    return row;
  }).filter(function(r){return r.opps||r.ropps||r.turns||r.codRan+r.maintRan||r.codRev+r.maintRev})
    .sort(function(x,y){return(y.codRev+y.maintRev)-(x.codRev+x.maintRev)||y.turns-x.turns});
}

function render(){

function setDay(d){day=d;render()}

// ── data feed ──
async function fetchData(){
  try{
    var r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    data=await r.json();feedError=null;
  }catch(e){
    console.error(e);
    feedError=data?"Data feed temporarily unavailable - showing the last good pull.":"Data feed unavailable - try again in a minute.";
  }
}
async function refresh(){await Promise.all([fetchData(),loadSettings()]);render()}

// ── access gate (hosted mode only; same code as the Command Center) ──
const ACCESS_HASH="d8305f8a240c399b7b692b604e648533d54b1eb84105f8c9b1d3fa6a55f65120";
const ACCESS_KEY="cc-access-v1";
async function sha256hex(s){
  var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return[...new Uint8Array(b)].map(function(x){return x.toString(16).padStart(2,"0")}).join("");
}
async function gate(){
  var isLocal=location.protocol!=="https:";
  if(isLocal||!window.isSecureContext)return true;
  if(sessionStorage.getItem(ACCESS_KEY)===ACCESS_HASH)return true;
  for(;;){
    var code=prompt("CASPR\n\nEnter access code:");
    if(code===null)continue;
    if(await sha256hex(code.trim())===ACCESS_HASH){sessionStorage.setItem(ACCESS_KEY,ACCESS_HASH);return true}
    alert("Wrong access code.");
  }
}
gate().then(refresh);
setInterval(refresh,REFRESH_MINUTES*60*1000);
</script>
