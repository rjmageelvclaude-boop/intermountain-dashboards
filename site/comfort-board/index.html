<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CASPR</title>
<style>
:root{
  --page:#f4f6f9; --surface:#ffffff; --surface2:#f1f3f7; --ink:#17212f; --muted:#687382; --faint:#98a2b3;
  --hair:#e4e8ef; --hair2:#d5dbe5;
  --good:#157a4c; --good-bg:#e3f3ea; --bad:#bb3540; --bad-bg:#fae8ea; --warn:#9a6700; --warn-bg:#fdf3d7;
  --bar-track:#e9edf3; --zebra:#f8fafc; --wkend:#fdf7ea;
  --c-turn:#1d4ed8; --c-mark:#b45309; --c-cost:#0e7490; --c-self:#6d28d9;
}
:root[data-theme="dark"]{
  --page:#0b1120; --surface:#131b2b; --surface2:#1a2438; --ink:#eaeff7; --muted:#93a0b4; --faint:#6d7a90;
  --hair:rgba(255,255,255,.08); --hair2:rgba(255,255,255,.16);
  --good:#4bd695; --good-bg:rgba(75,214,149,.13); --bad:#ff858e; --bad-bg:rgba(255,133,142,.12);
  --warn:#f0b268; --warn-bg:rgba(240,178,104,.12);
  --bar-track:rgba(255,255,255,.10); --zebra:rgba(255,255,255,.025); --wkend:rgba(240,178,104,.07);
  --c-turn:#8ab4ff; --c-mark:#f0b268; --c-cost:#67d3e8; --c-self:#c4a5ff;
}
:root[data-co="sierra"]{--accent:#24408e;--accent-ink:#fff;--tint:rgba(36,64,142,.06);--tint2:rgba(36,64,142,.12);--band1:#1c3684;--band2:#4f6cd4}
:root[data-co="ultimate"]{--accent:#6d28d9;--accent-ink:#fff;--tint:rgba(109,40,217,.06);--tint2:rgba(109,40,217,.12);--band1:#581cb8;--band2:#9061f0}
:root[data-co="russett"]{--accent:#b91c1c;--accent-ink:#fff;--tint:rgba(185,28,28,.06);--tint2:rgba(185,28,28,.12);--band1:#9a1616;--band2:#e04a3a}
:root[data-theme="dark"][data-co="sierra"]{--accent:#7db2ff;--accent-ink:#0b1120;--tint:rgba(125,178,255,.08);--tint2:rgba(125,178,255,.18)}
:root[data-theme="dark"][data-co="ultimate"]{--accent:#c4a5ff;--accent-ink:#0b1120;--tint:rgba(196,165,255,.08);--tint2:rgba(196,165,255,.18)}
:root[data-theme="dark"][data-co="russett"]{--accent:#ff8f96;--accent-ink:#0b1120;--tint:rgba(255,143,150,.08);--tint2:rgba(255,143,150,.18)}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(1100px 380px at 50% -120px,var(--tint2),transparent 70%),var(--page)}
.wrap{width:100%;margin:0 auto;padding:18px 22px 34px}
.board{background:var(--surface);border:1px solid var(--hair);border-radius:18px;overflow:hidden;box-shadow:0 8px 28px rgba(13,25,45,.07),0 1px 3px rgba(13,25,45,.05)}
.topbar{display:flex;align-items:center;gap:14px;padding:16px 22px 14px;flex-wrap:wrap;
  background:linear-gradient(115deg,var(--band1) 20%,var(--band2) 100%);color:#fff}
.wordmark{font-size:21px;font-weight:800;letter-spacing:.04em;white-space:nowrap;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.18)}
.wordmark small{display:block;font-size:10px;font-weight:600;color:rgba(255,255,255,.72);letter-spacing:.14em;text-transform:uppercase;text-shadow:none}
.tabs{display:flex;gap:3px;background:var(--tint);padding:4px;border-radius:11px;flex-wrap:wrap}
.tabs.co-tabs{margin-left:auto;background:rgba(255,255,255,.16)}
.tab{font-size:12.5px;font-weight:600;color:var(--muted);padding:7px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;user-select:none;transition:background .15s,color .15s}
.tab:hover{color:var(--ink)}
.tab.on{background:var(--accent);color:var(--accent-ink);font-weight:700;box-shadow:0 1px 3px rgba(13,25,45,.18)}
.co-tabs .tab{color:rgba(255,255,255,.82)}
.co-tabs .tab:hover{color:#fff}
.co-tabs .tab.on{background:#fff;color:var(--band1)}
.updated{display:flex;align-items:center;gap:6px;font-size:11.5px;color:rgba(255,255,255,.85);white-space:nowrap}
.updated .pulse{width:7px;height:7px;border-radius:50%;background:#7ef0b0;animation:pulse 2.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@media (prefers-reduced-motion: reduce){.updated .pulse{animation:none}}
.theme-btn{border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.08);color:#fff;font-size:13px;padding:5px 10px;border-radius:9px;cursor:pointer;font-family:inherit}
.theme-btn:hover{background:rgba(255,255,255,.18)}
.theme-btn:focus-visible{outline:2px solid #fff;outline-offset:2px}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.co-tabs .tab:focus-visible{outline-color:#fff}
.subbar{display:flex;align-items:center;gap:10px;padding:10px 22px;border-bottom:1px solid var(--hair);flex-wrap:wrap}
select.daypick{border:1px solid var(--hair2);background:var(--surface);color:var(--ink);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 9px;border-radius:8px}
.body{padding:18px 22px 10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:18px}
.card{background:linear-gradient(165deg,var(--tint) 0%,var(--surface) 60%);border:1px solid var(--hair);border-radius:14px;padding:15px 17px;position:relative;overflow:hidden;transition:box-shadow .15s,transform .15s}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--band1),var(--band2))}
.card:hover{box-shadow:0 6px 18px rgba(13,25,45,.10);transform:translateY(-1px)}
.card .c-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:7px}
.card .c-label::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--band2);margin-right:6px;vertical-align:1px}
.card .c-val{font-size:31px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.card .c-sub{font-size:11.5px;margin-top:8px;font-weight:600;color:var(--faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.capbar{height:6px;border-radius:3px;background:var(--bar-track);margin-top:9px;position:relative;overflow:hidden}
.capbar i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:linear-gradient(90deg,var(--band2),var(--band1))}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.chip.up{color:var(--good);background:var(--good-bg)}
.chip.down{color:var(--bad);background:var(--bad-bg)}
.chip.flat{color:var(--warn);background:var(--warn-bg)}
.sect{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:20px 2px 10px;display:flex;align-items:center}
.sect::before{content:"";display:inline-block;width:4px;height:13px;border-radius:2px;background:linear-gradient(180deg,var(--band2),var(--band1));margin-right:8px;flex:none}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.batgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(560px,100%),1fr));gap:16px}
.defs{margin:16px 2px 6px;padding:12px 16px;font-size:12.5px;font-weight:500;color:var(--muted);line-height:1.65;display:flex;flex-direction:column;gap:6px;background:var(--tint);border-left:3px solid var(--band2);border-radius:0 10px 10px 0}
.defs b{color:var(--ink)}
.tbl-scroll{overflow-x:auto;border:1px solid var(--hair);border-radius:12px;margin-bottom:16px;box-shadow:0 1px 3px rgba(13,25,45,.04)}
table.g{width:100%;border-collapse:separate;border-spacing:0;font-size:14px}
table.g th,table.g td{padding:9px 13px;text-align:right;font-weight:600;border-bottom:1px solid var(--hair);white-space:nowrap;font-variant-numeric:tabular-nums}
table.g thead th{background-color:var(--surface);background-image:linear-gradient(var(--tint),var(--tint));font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);position:sticky;top:0;z-index:2;border-bottom:2px solid var(--tint2)}
table.g th:first-child,table.g td:first-child{text-align:left;padding-left:15px}
table.g tbody tr:nth-child(even):not(.tot) td{background:var(--zebra)}
table.g tbody tr.wkend td{background:var(--wkend)}
table.g tbody tr:hover td{background:var(--tint)}
table.g tbody tr:last-child td{border-bottom:none}
table.g tr.tot td{background:var(--tint);font-weight:800;border-top:2px solid var(--tint2)}
table.g .grp{border-left:1px solid var(--hair2)}
table.g th.sortable{cursor:pointer;user-select:none}
table.g th.sortable:hover{color:var(--ink)}
table.g .dim{color:var(--faint)}
.tt-turn{color:var(--c-turn)}.tt-mark{color:var(--c-mark)}.tt-cost{color:var(--c-cost)}.tt-self{color:var(--c-self)}
.rankn{display:inline-block;min-width:22px;color:var(--faint);font-size:11.5px;font-weight:700}
.medal{display:inline-flex;align-items:center;justify-content:center;min-width:30px;padding:2px 8px;border-radius:999px;font-weight:800;font-size:11px;letter-spacing:.02em}
.m1{background:linear-gradient(135deg,#f9dd7e,#e0af32);color:#4a3a06;box-shadow:0 1px 3px rgba(224,175,50,.45)}
.m2{background:linear-gradient(135deg,#eef1f6,#bfc9d6);color:#3c4654;box-shadow:0 1px 3px rgba(140,155,175,.4)}
.m3{background:linear-gradient(135deg,#edbd8f,#cb8a4b);color:#48290b;box-shadow:0 1px 3px rgba(203,138,75,.45)}
.rankp{display:inline-flex;align-items:center;justify-content:center;min-width:30px;color:var(--faint);font-size:11.5px;font-weight:700}
.rbar{display:inline-block;vertical-align:middle;height:7px;border-radius:3px;background:var(--bar-track);width:90px;margin-left:10px;position:relative;overflow:hidden}
.rbar i{position:absolute;top:0;bottom:0;left:0;border-radius:3px;background:linear-gradient(90deg,var(--band2),var(--band1))}
.trend{font-size:12px;font-weight:800}
.trend.p{color:var(--good)}.trend.n{color:var(--bad)}.trend.z{color:var(--faint)}
.edit{cursor:pointer}
.edit:hover{outline:2px dashed var(--accent);outline-offset:-2px;border-radius:6px}
.setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:14px}
.setup-box{background:var(--surface);border:1px solid var(--hair);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(13,25,45,.04)}
.setup-box h3{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:11px 14px 8px;background:var(--tint);border-bottom:1px solid var(--hair)}
.setup-box .row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-top:1px solid var(--hair);font-size:13.5px;font-weight:600}
.setup-box .row span:first-child{color:var(--muted)}
.setup-box .row b{font-variant-numeric:tabular-nums}
.footer{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:10px 22px 12px;font-size:11px;font-weight:500;color:var(--faint);border-top:1px solid var(--hair)}
.feed-err{margin-top:10px;font-size:12px;font-weight:700;color:var(--bad)}
.dash{color:var(--faint)}
@media(min-width:1750px){
  .card .c-val{font-size:36px}
  table.g{font-size:15.5px}
  .tab{font-size:14px;padding:8px 16px}
  .wordmark{font-size:23px}
}
@media(max-width:980px){.duo{grid-template-columns:1fr}}
@media(max-width:700px){
  .wrap{padding:12px 8px 28px}
  .topbar{padding:12px 12px 10px;gap:8px}
  .tabs.co-tabs{margin-left:0;width:100%;order:5}
  .body{padding:12px 10px 6px}
  .card .c-val{font-size:22px}
  table.g{font-size:12.5px}
  table.g th,table.g td{padding:7px 8px}
  .rbar{width:44px;margin-left:6px}
  .footer{padding:10px 12px}
}
</style>
</head>
<body>
<div class="wrap" id="app">
<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:var(--faint)"><div style="text-align:center"><div style="font-size:32px;margin-bottom:12px">&#128202;</div><div style="font-size:14px;font-weight:600">Loading CASPR...</div></div></div>
</div>
<script>
// Monthly plan inputs (workdays, budgeted calls, close % and average tickets
// per lead type) are shared for all viewers through the same PIN-protected
// Apps Script store the Command Center uses, namespaced under co="comfort".
const BUDGET_URL="https://script.google.com/macros/s/AKfycby-J4xARcDQoDUwSfX6qsjYnM_QZyDfhd09WVBQXomJkLsrDysnkw-L0EZu0_S9Q4kz-w/exec";
const DATA_URL="data.json";
const REFRESH_MINUTES=5;

const PIN_KEY="pcc-pin";
const LS_KEY="cr-settings-v1";
const CO_KEY="cr-co-v1";
const VIEW_KEY="cr-view-v1";
const THEME_KEY="cr-theme";
const COS=["sierra","ultimate","russett"];
const VIEWS=[["score","Scoreboard"],["dispatch","Tech Dispatch Order"],["adv","Sales Dispatch Order"],["turn","Turnovers"],["setup","Monthly Setup"]];
const TYPES=[["turnover","Turnover","turn"],["marketed","Marketed","mark"],["costco","Costco","cost"],["selfgen","Self-Gen","self"]];

const PLAN_FIELDS=[
  ["workdays","Budgeted work days"],
  ["svcCalls","Budgeted service calls"],
  ["roppPct","ROPP rate % of service calls"],
  ["toRate","Planned turnover rate %"],
  ["mktLeads","Marketed leads budgeted"],
  ["costcoLeads","Costco leads budgeted"],
  ["selfLeads","Self-gen leads budgeted"],
  ["closeTurn","Turnover close %"],
  ["closeMkt","Marketed close %"],
  ["closeCostco","Costco close %"],
  ["closeSelf","Self-gen close %"],
  ["avgTurn","Turnover avg ticket $"],
  ["avgMkt","Marketed avg ticket $"],
  ["avgCostco","Costco avg ticket $"],
  ["avgSelf","Self-gen avg ticket $"],
];

let data=null,settings=JSON.parse(localStorage.getItem(LS_KEY)||"{}"),synced=false,feedError=null;
let co=localStorage.getItem(CO_KEY);if(COS.indexOf(co)<0)co="sierra";
let view=localStorage.getItem(VIEW_KEY);if(!VIEWS.some(function(v){return v[0]===view}))view="score";
let day="mtd"; // "mtd" or "YYYY-MM-DD"
let dispatchSort=null; // {key, dir} column sort on Tech Dispatch Order; null = batting order

function applyTheme(t){document.documentElement.setAttribute("data-theme",t);localStorage.setItem(THEME_KEY,t)}
applyTheme(localStorage.getItem(THEME_KEY)||(window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
function toggleTheme(){applyTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");render()}

// ── shared settings (Apps Script) ──
async function post(body){
  var r=await fetch(BUDGET_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(body)});
  return r.json();
}
async function loadSettings(){
  try{
    var j=await post({action:"getBudgets"});
    if(j&&j.ok){settings=(j.budgets&&j.budgets.comfort)||{};synced=true;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
  }catch(e){console.warn("Shared inputs unavailable - using this device's saved values",e)}
}
async function saveSetting(key,value){
  settings[key]=value;localStorage.setItem(LS_KEY,JSON.stringify(settings));render();
  if(!synced)return;
  var pin=localStorage.getItem(PIN_KEY)||prompt("Enter the PIN to save shared plan inputs:");
  if(!pin)return;
  try{
    var j=await post({action:"setBudget",pin:pin,co:"comfort",key:key,value:value});
    if(j&&j.ok){localStorage.setItem(PIN_KEY,pin);settings=(j.budgets&&j.budgets.comfort)||settings;localStorage.setItem(LS_KEY,JSON.stringify(settings))}
    else if(j&&j.error==="bad-pin"){localStorage.removeItem(PIN_KEY);alert("Wrong PIN - change was NOT saved for other viewers.")}
    else{alert("Could not save shared input: "+((j&&j.error)||"unknown error"))}
  }catch(e){alert("Could not reach the settings server - change saved on this device only.")}
  render();
}
function plan(field){
  var v=settings[co+"|"+(data?data.month:"")+"|"+field];
  return(v===undefined||v===""||isNaN(Number(v)))?null:Number(v);
}
function editPlan(field,label){
  var cur=plan(field);
  var v=prompt(label+" - "+co.charAt(0).toUpperCase()+co.slice(1)+", "+monthName()+":",cur===null?"":cur);
  if(v===null)return;
  v=v.trim();
  if(v!==""&&isNaN(Number(v))){alert("Enter a number.");return}
  saveSetting(co+"|"+data.month+"|"+field,v===""?"":Number(v));
}

// ── helpers ──
function fmt$(v){return(v<0?"-":"")+"$"+Math.abs(Math.round(v)).toLocaleString()}
function fmt$0(v){return v?fmt$(v):'<span class="dash">&mdash;</span>'}
function pct(n,d){return d?Math.round(n/d*100)+"%":'<span class="dash">&mdash;</span>'}
function n0(v){return v?v:'<span class="dash">&mdash;</span>'}
function monthName(){
  if(!data)return"";
  var p=data.month.split("-");
  return new Date(p[0],p[1]-1,1).toLocaleString("default",{month:"long",year:"numeric"});
}
function fmtDay(iso){var p=iso.split("-");return parseInt(p[1])+"/"+parseInt(p[2])}
function dowOf(iso){return new Date(iso+"T12:00:00").toLocaleString("default",{weekday:"short"})}
function isWkend(iso){var d=new Date(iso+"T12:00:00").getDay();return d===0||d===6}
function B(){return data.companies[co]}
function chip(v,fmt){
  var cls=v>0?"up":v<0?"down":"flat";
  var s=(v>0?"+":"")+(fmt?fmt(v):v);
  return'<span class="chip '+cls+'">'+s+'</span>';
}
// rank badge: gold/silver/bronze medals for the top 3, quiet number after
function rankChip(i){return i<3?'<span class="medal m'+(i+1)+'">#'+(i+1)+'</span>':'<span class="rankp">#'+(i+1)+'</span>'}

// ── daily series (Recent Days table) ──
// One entry per calendar day with any activity: {leads, sold, revenue, turns}
function dailySeries(){
  var b=B(),out={};
  Object.keys(b.advisorDaily).forEach(function(d){
    var t={leads:0,sold:0,revenue:0,turns:0};
    var cells=b.advisorDaily[d];
    Object.keys(cells).forEach(function(cid){
      TYPES.forEach(function(ty){
        var x=cells[cid][ty[0]];
        if(x){t.leads+=x[0];t.sold+=x[1];t.revenue+=x[2]}
      });
    });
    out[d]=t;
  });
  Object.keys(b.techDaily).forEach(function(d){
    var t=out[d]=out[d]||{leads:0,sold:0,revenue:0,turns:0};
    var cells=b.techDaily[d];
    Object.keys(cells).forEach(function(tid){
      t.turns+=(cells[tid].codTurn||0)+(cells[tid].maintTurn||0);
    });
  });
  return out;
}
// planned monthly expectations: leads x close% x avg ticket
function planCalc(){
  var svc=plan("svcCalls"),ropp=plan("roppPct"),to=plan("toRate");
  var roppCalls=(svc!==null&&ropp!==null)?svc*ropp/100:null;
  var leads={turnover:(roppCalls!==null&&to!==null)?roppCalls*to/100:null,
             marketed:plan("mktLeads"),costco:plan("costcoLeads"),selfgen:plan("selfLeads")};
  var close={turnover:plan("closeTurn"),marketed:plan("closeMkt"),costco:plan("closeCostco"),selfgen:plan("closeSelf")};
  var avg={turnover:plan("avgTurn"),marketed:plan("avgMkt"),costco:plan("avgCostco"),selfgen:plan("avgSelf")};
  var out={types:{},revenue:null,sales:null,roppCalls:roppCalls};
  TYPES.forEach(function(t){
    var k=t[0],l=leads[k],c=close[k],a=avg[k];
    var sales=(l!==null&&c!==null)?l*c/100:null;
    var rev=(sales!==null&&a!==null)?sales*a:null;
    out.types[k]={leads:l,close:c,avg:a,sales:sales,revenue:rev};
    if(rev!==null){out.revenue=(out.revenue||0)+rev}
    if(sales!==null){out.sales=(out.sales||0)+sales}
  });
  return out;
}
// Mon-Sat days elapsed (through today) and in the whole month - the pace clock
function workdayClock(){
  var b=B(),p=data.month.split("-"),y=+p[0],m=+p[1];
  var today=+b.today.split("-")[2],total=b.monthDays,el=0,all=0;
  for(var d=1;d<=total;d++){
    var dow=new Date(y,m-1,d).getDay();
    if(dow!==0){all++;if(d<=today)el++}
  }
  var budget=plan("workdays");
  if(budget!==null&&budget>0){el=Math.min(el,budget);all=budget}
  return{elapsed:el,total:all};
}

// MTD totals by type for the company (sums the advisor rows)
function mtdTotals(){
  var b=B(),out={},tot={leads:0,sold:0,revenue:0};
  TYPES.forEach(function(t){out[t[0]]={leads:0,sold:0,revenue:0}});
  b.advisors.forEach(function(a){
    TYPES.forEach(function(t){
      var x=a.types[t[0]];
      out[t[0]].leads+=x.leads;out[t[0]].sold+=x.sold;out[t[0]].revenue+=x.revenue;
    });
    tot.leads+=a.total.leads;tot.sold+=a.total.sold;tot.revenue+=a.total.revenue;
  });
  out._total=tot;
  return out;
}
// per-advisor numbers for one day (from advisorDaily) shaped like the MTD rows
function advisorsForDay(iso){
  var b=B(),d=b.advisorDaily[iso]||{};
  return b.advisors.map(function(a){
    var cell=d[String(a.id)]||{};
    var types={},tot={leads:0,sold:0,revenue:0};
    TYPES.forEach(function(t){
      var x=cell[t[0]]||[0,0,0];
      types[t[0]]={leads:x[0],sold:x[1],revenue:x[2]};
      tot.leads+=x[0];tot.sold+=x[1];tot.revenue+=x[2];
    });
    return{id:a.id,name:a.name,types:types,total:tot};
  }).filter(function(a){return a.total.leads||a.total.sold||a.total.revenue})
    .sort(function(x,y){return y.total.revenue-x.total.revenue||y.total.leads-x.total.leads});
}
const T_FIELDS=["codOpp","maintOpp","ropps","codTurn","maintTurn","codRan","maintRan","codSold","codRev","maintSold","maintRev","canc"];
function techsForDay(iso){
  var b=B(),d=b.techDaily[iso]||{};
  var byId={};b.techs.forEach(function(t){byId[String(t.id)]=t.name});
  return Object.keys(d).map(function(tid){
    var row={id:tid,name:byId[tid]||tid};
    T_FIELDS.forEach(function(f){row[f]=d[tid][f]||0});
    row.opps=row.codOpp+row.maintOpp;row.turns=row.codTurn+row.maintTurn;
    return row;
  }).filter(function(r){return r.opps||r.ropps||r.turns||r.codRan+r.maintRan||r.codRev+r.maintRev})
    .sort(function(x,y){return(y.codRev+y.maintRev)-(x.codRev+x.maintRev)||y.turns-x.turns});
}

// ── advisors: batting order per lead type ──
// Mirrors the workbook's batting-order boards: advisors ranked by $ per lead
// ran within each category. Gained/Lost = revenue - leads ran x (plan close %
// x plan avg ticket) from Monthly Setup; dashes until the plan is entered.
// Sales managers excluded from the batting orders (they still show in the
// main advisor table above): Sierra - Ryan Hernlund.
const BAT_EXCLUDE={sierra:[12289]};
function battingSection(rows){
  rows=rows.filter(function(a){return(BAT_EXCLUDE[co]||[]).indexOf(a.id)<0});
  var cats=[["turnover","Tech Generated Leads","turn","closeTurn","avgTurn"],
            ["marketed","Marketed Leads","mark","closeMkt","avgMkt"],
            ["costco","Costco Leads","cost","closeCostco","avgCostco"]]
    .filter(function(c){return c[0]!=="costco"||B().hasCostco});
  function fmtPar(v){var s="$"+Math.round(Math.abs(v)).toLocaleString();return v<0?"("+s+")":s}
  var boards=cats.map(function(c){
    var k=c[0],cl=plan(c[3]),av=plan(c[4]);
    var base=(cl!==null&&av!==null)?cl/100*av:null;
    var list=rows.map(function(a){
      var x=a.types[k];
      return{name:a.name,leads:x.leads,sold:x.sold,rev:x.revenue,pl:x.leads?x.revenue/x.leads:null};
    }).filter(function(x){return x.leads||x.sold});
    list.sort(function(a,b){return(b.pl===null?-1:b.pl)-(a.pl===null?-1:a.pl)||b.rev-a.rev});
    var vals=list.filter(function(x){return x.pl!==null}).map(function(x){return x.pl});
    var mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
    var tot={leads:0,sold:0,rev:0};
    list.forEach(function(x){tot.leads+=x.leads;tot.sold+=x.sold;tot.rev+=x.rev});
    var body=list.map(function(x,i){
      var gain=base!==null?x.rev-x.leads*base:null;
      var gainTd=gain===null?'<td><span class="dash">&mdash;</span></td>':
        '<td style="background:var(--'+(gain>=0?'good':'bad')+'-bg);color:var(--'+(gain>=0?'good':'bad')+')">'+fmtPar(gain)+'</td>';
      var plTd;
      if(x.pl===null)plTd='<td><span class="dash">&mdash;</span></td>';
      else{var t=mx>mn?(x.pl-mn)/(mx-mn):1;
        plTd='<td style="background:hsla('+Math.round(18+t*122)+',65%,45%,.28);font-weight:800">'+fmt$(x.pl)+'</td>'}
      return'<tr><td>'+rankChip(i)+'</td>'+
        '<td style="text-align:left">'+x.name+'</td>'+
        '<td>'+n0(x.leads)+'</td><td>'+n0(x.sold)+'</td><td>'+pct(x.sold,x.leads)+'</td>'+
        '<td>'+fmt$0(x.rev)+'</td><td>'+(x.sold?fmt$(x.rev/x.sold):'<span class="dash">&mdash;</span>')+'</td>'+
        gainTd+plTd+'</tr>';
    }).join("");
    var tGain=base!==null?tot.rev-tot.leads*base:null;
    var trow='<tr class="tot"><td></td><td style="text-align:left">TEAM</td>'+
      '<td>'+tot.leads+'</td><td>'+tot.sold+'</td><td>'+pct(tot.sold,tot.leads)+'</td>'+
      '<td>'+fmt$(tot.rev)+'</td><td>'+(tot.sold?fmt$(tot.rev/tot.sold):"&mdash;")+'</td>'+
      '<td'+(tGain!==null?' style="color:var(--'+(tGain>=0?'good':'bad')+')"':'')+'>'+(tGain===null?"&mdash;":fmtPar(tGain))+'</td>'+
      '<td>'+(tot.leads?fmt$(tot.rev/tot.leads):"&mdash;")+'</td></tr>';
    var empty='<tr><td colspan="9" style="text-align:center;color:var(--faint)">No activity</td></tr>';
    return'<div><div class="sect tt-'+c[2]+'">'+c[1]+'</div><div class="tbl-scroll"><table class="g"><thead><tr>'+
      '<th>#</th><th>Comfort Advisor</th><th>Ran</th><th>Sold</th><th>Conv.</th><th>Sales</th><th>Avg Sale</th><th>Gained / Lost Sales</th><th>$/Lead Ran</th>'+
      '</tr></thead><tbody>'+(list.length?body+trow:empty)+'</tbody></table></div></div>';
  }).join("");
  var defs='<div class="defs">'+
    '<div><b>$/Lead Ran</b> &mdash; sales sold &divide; leads ran: the average dollars an advisor produces every time they run a lead in that category. This is what the batting order is ranked by.</div>'+
    '<div><b>Gained or Lost Sales</b> &mdash; sales sold &minus; (leads ran &times; planned close % &times; planned avg ticket): dollars above (green) or below (red) what the monthly plan expects from that many leads. The planned close % and avg ticket come from the Monthly Setup tab.</div>'+
  '</div>';
  return'<div class="sect">Batting Order &middot; ranked by $ per lead ran</div><div class="batgrid">'+boards+'</div>'+defs;
}

  var body=rows.map(function(r,i){

      '<td class="grp"><b>'+n0(r.ropps||0)+'</b></td>'+
      '<td class="grp">'+n0(r.codTurn)+'</td><td>'+n0(r.maintTurn)+'</td><td><b>'+n0(r.turns)+'</b></td>'+
      '<td>'+pct(r.turns,r.ropps||0)+'</td>'+
      '<td class="grp">'+n0(r.codRan)+'</td><td>'+n0(r.maintRan)+'</td>'+
      '<td class="grp">'+n0(r.codSold+r.maintSold)+'</td><td><b>'+fmt$0(r.codRev+r.maintRev)+'</b></td>'+
      '<td>'+(r.opps?fmt$((r.codRev+r.maintRev)/r.opps):'<span class="dash">&mdash;</span>')+'</td></tr>';
  }).join("");
  var trow='<tr class="tot"><td>TEAM</td>'+
    '<td class="grp">'+sums.codOpp+'</td><td>'+sums.maintOpp+'</td><td>'+sums.opps+'</td>'+
    '<td class="grp">'+sums.ropps+'</td>'+
    '<td class="grp">'+sums.codTurn+'</td><td>'+sums.maintTurn+'</td><td>'+sums.turns+'</td>'+
    '<td>'+pct(sums.turns,sums.ropps)+'</td>'+
    '<td class="grp">'+(sums.codRan)+'</td><td>'+(sums.maintRan)+'</td>'+
    '<td class="grp">'+(sums.codSold+sums.maintSold)+'</td><td>'+fmt$(sums.codRev+sums.maintRev)+'</td>'+
    '<td>'+(sums.opps?fmt$((sums.codRev+sums.maintRev)/sums.opps):'<span class="dash">&mdash;</span>')+'</td></tr>';
  var empty='<div style="text-align:center;padding:40px;color:var(--faint);font-weight:600">No technician activity for this day.</div>';
  var inner=rows.length?'<div class="tbl-scroll"><table class="g"><thead>'+h1+h2+'</thead><tbody>'+body+trow+'</tbody></table></div>':empty;
  document.getElementById("app").innerHTML=shell(inner,
    "Opps = completed opportunity jobs in the HVAC demand/maintenance BUs &middot; ROPPs = ROPP-tagged completed jobs (net of Management Removed) &middot; TO Rate = turns &divide; ROPPs ran &middot; turns = sales jobs the tech generated (canceled excluded) &middot; sales credit the generating tech &middot; $/Opp = turn sales &divide; opportunities ran",true);
}

// ── tech dispatch order ──
// The workbook's Tech Dispatch Order sheet: techs ranked by TGL sales per
// opportunity given (ROPPs). Techs with fewer than MIN_DISPATCH_OPPS opps
// given drop to the bottom of the order - too small a sample to rank.
const MIN_DISPATCH_OPPS=5;
const PARTNER={sierra:"SIE",ultimate:"ULT",russett:"RUS"};
function renderDispatch(){
  var b=B();
  var rows=b.techs.map(function(t){
    var set=t.turns+(t.canc||0),ran=t.codRan+t.maintRan;
    var sold=t.codSold+t.maintSold,sales=t.codRev+t.maintRev,opps=t.ropps||0;
    return{name:t.name,opps:opps,set:set,canc:t.canc||0,ran:ran,sold:sold,sales:sales,
           perOpp:opps?sales/opps:null};
  }).filter(function(r){return r.opps||r.set||r.sales});
  // batting order (the rank medals) is always sales-per-opp with the
  // small-sample rule, no matter how the table is currently sorted
  rows.sort(function(a,c){
    var am=a.opps>=MIN_DISPATCH_OPPS?1:0,cm=c.opps>=MIN_DISPATCH_OPPS?1:0;
    if(am!==cm)return cm-am;
    return(c.perOpp===null?-1:c.perOpp)-(a.perOpp===null?-1:a.perOpp);
  });
  rows.forEach(function(r,i){r.rank=i});
  var GET={
    name:function(r){return r.name.toLowerCase()},
    opps:function(r){return r.opps},set:function(r){return r.set},
    tglPct:function(r){return r.opps?r.set/r.opps:-1},
    ran:function(r){return r.ran},canc:function(r){return r.canc},
    cancelRate:function(r){return r.set?r.canc/r.set:-1},
    netPct:function(r){return r.opps?r.ran/r.opps:-1},
    sold:function(r){return r.sold},sales:function(r){return r.sales},
    conv:function(r){return r.ran?r.sold/r.ran:-1},
    perOpp:function(r){return r.perOpp===null?-1:r.perOpp},
  };
  if(dispatchSort&&GET[dispatchSort.key]){
    var g=GET[dispatchSort.key],dir=dispatchSort.dir;
    rows.sort(function(a,c){var x=g(a),y=g(c);return(x<y?-1:x>y?1:0)*dir||a.rank-c.rank});
  }
  var tot={opps:0,set:0,canc:0,ran:0,sold:0,sales:0};
  rows.forEach(function(r){Object.keys(tot).forEach(function(k){tot[k]+=r[k]})});
  function cancelTd(canc,set){
    if(!set)return'<td><span class="dash">&mdash;</span></td>';
    var v=canc/set;
    return'<td'+(v>=.5?' style="background:var(--bad-bg);color:var(--bad)"':'')+'>'+Math.round(v*100)+'%</td>';
  }
  function perOppTd(sales,opps){
    return'<td style="background:var(--good-bg);color:var(--good);font-weight:800">'+(opps?fmt$(sales/opps):'<span class="dash">&mdash;</span>')+'</td>';
  }
  var body=rows.map(function(r){
    return'<tr><td>'+rankChip(r.rank)+'</td>'+
      '<td style="text-align:left">'+r.name+(r.opps<MIN_DISPATCH_OPPS?' <span class="dash" title="Fewer than '+MIN_DISPATCH_OPPS+' opps given - ranked last">*</span>':'')+'</td>'+
      '<td>'+PARTNER[co]+'</td>'+
      '<td>'+n0(r.opps)+'</td><td>'+n0(r.set)+'</td>'+
      '<td>'+pct(r.set,r.opps)+'</td>'+
      '<td>'+n0(r.ran)+'</td><td>'+n0(r.canc)+'</td>'+
      cancelTd(r.canc,r.set)+
      '<td>'+pct(r.ran,r.opps)+'</td>'+
      '<td>'+n0(r.sold)+'</td><td><b>'+fmt$0(r.sales)+'</b></td>'+
      '<td>'+pct(r.sold,r.ran)+'</td>'+
      perOppTd(r.sales,r.opps)+'</tr>';
  }).join("");
  var trow='<tr class="tot"><td></td><td style="text-align:left">TEAM</td><td>'+PARTNER[co]+'</td>'+
    '<td>'+tot.opps+'</td><td>'+tot.set+'</td>'+
    '<td>'+pct(tot.set,tot.opps)+'</td>'+
    '<td>'+tot.ran+'</td><td>'+tot.canc+'</td>'+
    '<td>'+pct(tot.canc,tot.set)+'</td>'+
    '<td>'+pct(tot.ran,tot.opps)+'</td>'+
    '<td>'+tot.sold+'</td><td>'+fmt$(tot.sales)+'</td>'+
    '<td>'+pct(tot.sold,tot.ran)+'</td>'+
    perOppTd(tot.sales,tot.opps)+'</tr>';
  function hth(key,label,extra){
    var on=dispatchSort&&dispatchSort.key===key;
    var arrow=on?(dispatchSort.dir>0?" &#9650;":" &#9660;"):"";
    return'<th class="sortable"'+(extra||'')+' onclick="dispSort(\''+key+'\')" title="Sort by '+label+'">'+label+arrow+'</th>';
  }
  var head='<tr><th class="sortable" onclick="dispSort(null)" title="Back to batting order">#'+(dispatchSort?'':' &#9660;')+'</th>'+
    hth("name","Tech")+'<th>Partner</th>'+
    hth("opps","Opps Given")+hth("set","TGLs Set")+hth("tglPct","TGL %")+
    hth("ran","TGLs Ran")+hth("canc","TGLs Canc.")+hth("cancelRate","Cancel Rate")+
    hth("netPct","Net TGL %")+hth("sold","TGLs Sold")+hth("sales","TGL Sales")+
    hth("conv","C/A Conv. Rate")+hth("perOpp","Sales per Opp",' style="background:var(--good-bg)"')+'</tr>';
  var defs='<div class="defs">'+
    '<div><b>Opps Given</b> &mdash; completed service calls carrying the ROPP tag (net of Management Removed): the replacement opportunities the tech was handed.</div>'+
    '<div><b>TGLs Set</b> &mdash; turnovers the tech generated, day of creation, including ones later canceled &middot; <b>TGL %</b> = TGLs set &divide; opps given &middot; <b>Cancel Rate</b> = TGLs canceled &divide; TGLs set &middot; <b>Net TGL %</b> = TGLs ran &divide; opps given.</div>'+
    '<div><b>C/A Conv. Rate</b> &mdash; TGLs sold &divide; TGLs ran: how often the comfort advisor closes the leads this tech turns over.</div>'+
    '<div><b>Sales per Opp</b> &mdash; TGL sales &divide; opps given: dollars produced per replacement opportunity the tech was given. This is what the dispatch order is ranked by; techs with fewer than '+MIN_DISPATCH_OPPS+' opps given (*) drop to the bottom until they have a real sample.</div>'+
  '</div>';
  var empty='<div style="text-align:center;padding:40px;color:var(--faint);font-weight:600">No technician activity this month.</div>';
  var inner=rows.length?'<div class="tbl-scroll"><table class="g"><thead>'+head+'</thead><tbody>'+body+trow+'</tbody></table></div>'+defs:empty;
  document.getElementById("app").innerHTML=shell(inner,
    "MTD &middot; TGL sales = active Sold estimate subtotals on the tech's turnovers, credited to the generating tech",false);
}

// ── setup ──
// Actual MTD vs Expectations MTD tables, then the plan inputs.
function renderSetup(){
  var b=B(),p=planCalc(),clock=workdayClock(),m=mtdTotals();
  var frac=clock.total?clock.elapsed/clock.total:0;
  function fmtPar(v){var s="$"+Math.round(Math.abs(v)).toLocaleString();return v<0?"("+s+")":s}

  // Actual MTD table
  var aRows="";
  typeCols().forEach(function(t){
    var x=m[t[0]];
    aRows+='<tr><td class="tt-'+t[2]+'" style="font-weight:800">'+t[1]+'</td>'+
      '<td>'+n0(x.leads)+'</td><td>'+n0(x.sold)+'</td><td>'+pct(x.sold,x.leads)+'</td>'+
      '<td>'+(x.sold?fmt$(x.revenue/x.sold):'<span class="dash">&mdash;</span>')+'</td><td>'+fmt$0(x.revenue)+'</td></tr>';
  });
  var mt=m._total;
  aRows+='<tr class="tot"><td>Total</td><td>'+mt.leads+'</td><td>'+mt.sold+'</td><td>'+pct(mt.sold,mt.leads)+'</td>'+
    '<td>'+(mt.sold?fmt$(mt.revenue/mt.sold):"&mdash;")+'</td><td>'+fmt$(mt.revenue)+'</td></tr>';
  var actualTbl='<div><div class="sect">Actual MTD &middot; Leads &amp; Sales Results</div><div class="tbl-scroll"><table class="g"><thead><tr>'+
    '<th>Lead Type</th><th>Leads</th><th>Sold</th><th>Close %</th><th>Avg. Sale</th><th>Sales</th></tr></thead><tbody>'+aRows+'</tbody></table></div></div>';

  // Expectations MTD table: the plan prorated to workdays elapsed
  var eRows="",teLeads=0,teSales=0,teRev=0,teRevVar=0,teSalesVar=0;
  typeCols().forEach(function(t){
    var k=t[0],e=p.types[k],a=m[k];
    var eLeads=e.leads!==null?e.leads*frac:null;
    var eSales=e.sales!==null?e.sales*frac:null;
    var eRev=e.revenue!==null?e.revenue*frac:null;
    var revVar=a.revenue-(eRev||0),salesVar=a.sold-(eSales||0);
    teLeads+=eLeads||0;teSales+=eSales||0;teRev+=eRev||0;teRevVar+=revVar;teSalesVar+=salesVar;
    eRows+='<tr><td class="tt-'+t[2]+'" style="font-weight:800">'+t[1]+'</td>'+
      '<td>'+(eLeads!==null?Math.round(eLeads):"&mdash;")+'</td>'+
      '<td>'+(e.close!==null?e.close+"%":"&mdash;")+'</td>'+
      '<td>'+(e.avg!==null?fmt$(e.avg):"&mdash;")+'</td>'+
      '<td>'+(eSales!==null?eSales.toFixed(1):"&mdash;")+'</td>'+
      '<td>'+(eRev!==null?fmt$(eRev):"&mdash;")+'</td>'+
      '<td style="color:var(--'+(revVar>=0?'good':'bad')+')">'+fmtPar(revVar)+'</td>'+
      '<td style="color:var(--'+(salesVar>=0?'good':'bad')+')">'+(salesVar<0?"("+Math.abs(Math.round(salesVar*10)/10)+")":Math.round(salesVar*10)/10)+'</td></tr>';
  });
  eRows+='<tr class="tot"><td>Total</td><td>'+Math.round(teLeads)+'</td><td></td><td></td><td>'+teSales.toFixed(1)+'</td><td>'+fmt$(teRev)+'</td>'+
    '<td style="color:var(--'+(teRevVar>=0?'good':'bad')+')">'+fmtPar(teRevVar)+'</td>'+
    '<td style="color:var(--'+(teSalesVar>=0?'good':'bad')+')">'+(teSalesVar<0?"("+Math.abs(Math.round(teSalesVar*10)/10)+")":Math.round(teSalesVar*10)/10)+'</td></tr>';
  var expTbl='<div><div class="sect">Expectations MTD &middot; Leads &amp; Sales Results</div><div class="tbl-scroll"><table class="g"><thead><tr>'+
    '<th>Lead Type</th><th>Leads</th><th>Close %</th><th>Avg. Sale</th><th>Sold</th><th>Sales</th><th>Sales Var.</th><th>Sold Var.</th></tr></thead><tbody>'+eRows+'</tbody></table></div></div>';

  function row(f,l){
    var v=plan(f);
    return'<div class="row edit" onclick="editPlan(\''+f+'\',\''+l+'\')"><span>'+l+'</span><b>'+(v===null?'<span class="dash">tap to set</span>':(f.indexOf("avg")===0?fmt$(v):v+(f.indexOf("close")===0||f==="toRate"||f==="roppPct"?"%":"")))+'</b></div>';
  }
  // computed (non-editable) funnel rows
  function calcRow(l,v){
    return'<div class="row" style="background:var(--tint)"><span>'+l+'</span><b>'+(v===null?'<span class="dash">&mdash;</span>':Math.round(v))+'</b></div>';
  }
  var boxes='<div class="setup-grid">'+
    '<div class="setup-box"><h3>Turnover Funnel</h3>'+
      row("workdays","Budgeted work days")+
      row("svcCalls","Budgeted service calls")+
      row("roppPct","ROPP rate % of service calls")+
      calcRow("Budgeted ROPP calls on board",p.roppCalls)+
      row("toRate","Planned turnover rate %")+
      calcRow("Budgeted TGLs",p.types.turnover.leads)+
      row("closeTurn","Turnover close %")+'</div>'+
    '<div class="setup-box"><h3>Budgeted Leads</h3>'+row("mktLeads","Marketed leads budgeted")+(B().hasCostco?row("costcoLeads","Costco leads budgeted"):"")+row("selfLeads","Self-gen leads budgeted")+'</div>'+
    '<div class="setup-box"><h3>Close % by Lead Type</h3>'+row("closeMkt","Marketed close %")+(B().hasCostco?row("closeCostco","Costco close %"):"")+row("closeSelf","Self-gen close %")+'</div>'+
    '<div class="setup-box"><h3>Average Ticket by Lead Type</h3>'+row("avgTurn","Turnover avg ticket $")+row("avgMkt","Marketed avg ticket $")+(B().hasCostco?row("avgCostco","Costco avg ticket $"):"")+row("avgSelf","Self-gen avg ticket $")+'</div>'+
  '</div>';

  document.getElementById("app").innerHTML=shell(
    '<div class="duo">'+actualTbl+expTbl+'</div>'+
    '<div class="sect">Plan Inputs &middot; tap to edit</div>'+boxes,
    "Plan edits ask for the PIN once and are shared with every viewer &middot; ROPP calls = service calls &times; ROPP rate &middot; budgeted TGLs = ROPP calls &times; turnover rate &middot; expectations prorate the plan to workdays elapsed &middot; pace = MTD &divide; workdays MTD &times; workdays in month",false);
}

function render(){
  var app=document.getElementById("app");
  if(feedError&&!data){app.innerHTML='<div style="text-align:center;padding:80px 20px;color:var(--faint);font-weight:600">'+feedError+'</div>';return}
  if(!data)return;
  document.documentElement.setAttribute("data-co",co);
  if(view==="adv")renderAdvisors();
  else if(view==="turn")renderTurnovers();
  else if(view==="dispatch")renderDispatch();
  else if(view==="setup")renderSetup();
  else renderScore();
}
function setCo(c){co=c;localStorage.setItem(CO_KEY,c);render()}
function dispSort(k){
  if(k===null||k==="null")dispatchSort=null;
  else if(dispatchSort&&dispatchSort.key===k)dispatchSort.dir*=-1;
  else dispatchSort={key:k,dir:k==="name"?1:-1};
  render();
}
function setView(v){view=v;localStorage.setItem(VIEW_KEY,v);render()}
function setDay(d){day=d;render()}

// ── data feed ──
async function fetchData(){
  try{
    var r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    data=await r.json();feedError=null;
  }catch(e){
    console.error(e);
    feedError=data?"Data feed temporarily unavailable - showing the last good pull.":"Data feed unavailable - try again in a minute.";
  }
}
async function refresh(){await Promise.all([fetchData(),loadSettings()]);render()}

// ── access gate (hosted mode only; same code as the Command Center) ──
const ACCESS_HASH="d8305f8a240c399b7b692b604e648533d54b1eb84105f8c9b1d3fa6a55f65120";
const ACCESS_KEY="cc-access-v1";
async function sha256hex(s){
  var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return[...new Uint8Array(b)].map(function(x){return x.toString(16).padStart(2,"0")}).join("");
}
async function gate(){
  var isLocal=location.protocol!=="https:";
  if(isLocal||!window.isSecureContext)return true;
  if(sessionStorage.getItem(ACCESS_KEY)===ACCESS_HASH)return true;
  for(;;){
    var code=prompt("CASPR\n\nEnter access code:");
    if(code===null)continue;
    if(await sha256hex(code.trim())===ACCESS_HASH){sessionStorage.setItem(ACCESS_KEY,ACCESS_HASH);return true}
    alert("Wrong access code.");
  }
}
gate().then(refresh);
setInterval(refresh,REFRESH_MINUTES*60*1000);
</script>
