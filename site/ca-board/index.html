<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comfort Advisor Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;background:#e9eaec;color:#111;min-height:100vh}
.wrap{max-width:1780px;margin:0 auto;padding:14px 22px 26px}
/* ── top bar ── */
.topbar{display:flex;align-items:center;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.big-title{font-size:50px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;line-height:1;flex-shrink:0}
.big-title .period{font-size:17px;font-weight:800;color:#666;margin-left:6px;letter-spacing:0}
.controls{flex:1;display:flex;justify-content:center;align-items:center;gap:16px;font-weight:900;text-transform:uppercase;font-size:16px;letter-spacing:.5px}
.ctl{cursor:pointer;user-select:none;color:#111;white-space:nowrap}
.ctl:hover{color:#1273c8}
.ctl.dim{color:#b9bdc4}
.ctl .arr{font-size:18px}
.sep{color:#c6c9ce;font-weight:700}
.co-badge{flex-shrink:0;text-align:right}
.co-name{font-size:21px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--co);line-height:1.1}
.co-sub{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:1px}
/* ── layout ── */
.board{display:flex;gap:16px;align-items:stretch}
.feature{width:440px;flex-shrink:0}
.grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-content:start}
.card,.fcard{background:#fff;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px 18px}
/* ── featured (#1) card ── */
.fcard{height:100%;display:flex;flex-direction:column}
.fc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.fc-name{font-size:32px;font-weight:900;letter-spacing:-.5px;line-height:1.05}
.fc-dept{font-size:14px;font-weight:700;color:#777;margin-top:3px}
.rankb{background:var(--co);color:#fff;font-weight:900;border-radius:6px;padding:6px 13px;font-size:20px;flex-shrink:0}
.fc-photo{width:100%;height:390px;border-radius:4px;overflow:hidden;margin-bottom:14px;flex-shrink:0}
.avatar{width:100%;height:100%;object-fit:cover;display:block}
.avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--co),#5b7bd0);color:#fff;font-weight:900}
/* ── KPI rows ── */
.salesbar{display:flex;justify-content:space-between;align-items:center;background:var(--co);color:#fff;border-radius:4px;padding:12px 16px;font-weight:900;margin-bottom:8px}
.salesbar .v{font-size:24px}
.salesbar .l{font-size:18px}
.krow{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-radius:4px;font-weight:800;font-size:15px}
.krow:nth-child(odd){background:#f2f3f5}
.krow .kl{color:#8a8f98;font-weight:700;font-size:13.5px;text-align:right}
.krow.disc-g{background:#27a54a;color:#fff}.krow.disc-g .kl{color:#d8f3e0}
.krow.disc-y{background:#eab308;color:#fff}.krow.disc-y .kl{color:#fdf3cf}
.krow.disc-r{background:#dc2626;color:#fff}.krow.disc-r .kl{color:#fcdcdc}
.fcard .krow{font-size:19px;padding:12px 16px}
.fcard .krow .kl{font-size:15px}
/* ── small cards ── */
.c-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.c-name{font-size:19px;font-weight:900;letter-spacing:-.3px;line-height:1.1}
.c-dept{font-size:12px;font-weight:700;color:#777;margin-top:2px}
.card .rankb{font-size:14px;padding:4px 10px}
.card .salesbar{padding:8px 12px;margin-bottom:6px}
.card .salesbar .v{font-size:17px}.card .salesbar .l{font-size:13px}
.c-body{display:flex;gap:12px}
.c-photo{width:150px;height:186px;border-radius:4px;overflow:hidden;flex-shrink:0}
.c-kpis{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.card .krow{padding:6.5px 10px;font-size:13.5px}
.card .krow .kl{font-size:11px}
.footer{margin-top:14px;display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:#999;flex-wrap:wrap;gap:6px}
.warn{color:#b45309}
@media(max-width:1250px){.board{flex-direction:column}.feature{width:100%}.fc-photo{height:300px}.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.grid{grid-template-columns:1fr}.big-title{font-size:32px}}
</style>
</head>
<body>
<div class="wrap" id="app">
<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:#94a3b8"><div style="text-align:center"><div style="font-size:32px;margin-bottom:12px">🏆</div><div style="font-size:14px;font-weight:600">Loading Comfort Advisor Board...</div></div></div>
</div>
<script>
const DATA_URL="data.json";
const REFRESH_MINUTES=5;        // re-pull data.json
const ROTATE_SECONDS=20;        // auto-advance between slides
const DISC_YELLOW=0.10;         // avg discount >= this shows yellow
const DISC_RED=0.15;            // ... and >= this shows red

let ORDER=[["sierra","mtd"],["sierra","ytd"],["ultimate","mtd"],["ultimate","ytd"],["russett","mtd"],["russett","ytd"]];
const PERIOD_LABEL={mtd:"MTD",ytd:"YTD"};
const IDX_KEY="cab-idx-v1",PAUSE_KEY="cab-pause-v1";

let data=null,feedError=null;
let idx=Math.min(Math.max(parseInt(localStorage.getItem(IDX_KEY)||"0",10)||0,0),ORDER.length-1);
let paused=localStorage.getItem(PAUSE_KEY)==="1";

const money=n=>"$"+Math.round(n).toLocaleString("en-US");
const pct=n=>Math.round(n*100)+"%";
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const initials=name=>name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join("");

function discClass(d){return d>=DISC_RED?"disc-r":d>=DISC_YELLOW?"disc-y":"disc-g"}

// Photos: drop files in ca-board/photos/ named either by ServiceTitan tech id
// (12417.jpg) or by name slug (rob-dais.jpg). Missing photo = initials tile.
function photoHTML(a,big){
  const slug=a.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
  const srcs=[`photos/${a.id}.jpg`,`photos/${a.id}.png`,`photos/${slug}.jpg`,`photos/${slug}.png`];
  return `<img class="avatar" alt="" src="${srcs[0]}" data-srcs='${JSON.stringify(srcs)}'
    data-i="0" data-n="${esc(a.name)}" data-fs="${big?90:44}" onerror="phErr(this)">`;
}
window.phErr=function(img){
  const srcs=JSON.parse(img.dataset.srcs),i=+img.dataset.i+1;
  if(i<srcs.length){img.dataset.i=i;img.src=srcs[i];return}
  const d=document.createElement("div");
  d.className="avatar-fallback";d.style.fontSize=img.dataset.fs+"px";
  d.textContent=initials(img.dataset.n);
  img.replaceWith(d);
};

function kpisHTML(a){
  return `
    <div class="krow"><span>${money(a.bookPrice)}</span><span class="kl">Book Price Opps</span></div>
    <div class="krow ${discClass(a.avgDiscount)}"><span>${pct(a.avgDiscount)}</span><span class="kl">Avg Discount</span></div>
    <div class="krow"><span>${a.closed} / ${a.opps}</span><span class="kl">Closed Opps</span></div>
    <div class="krow"><span>${money(a.closedAvgSale)}</span><span class="kl">Closed Avg Sale</span></div>
    <div class="krow"><span>${pct(a.closeRate)}</span><span class="kl">Avg Close Rate</span></div>`;
}

function render(){
  const app=document.getElementById("app");
  if(!data){
    if(feedError)app.innerHTML=`<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:#94a3b8;font-weight:600">${esc(feedError)}</div>`;
    return;
  }
  if(!ORDER.length){app.innerHTML='<div style="display:flex;justify-content:center;align-items:center;height:80vh;color:#94a3b8;font-weight:600">No company data in the feed yet.</div>';return}
  const [coKey,period]=ORDER[idx];
  const co=data.companies[coKey];
  const p=co.periods[period];
  const advisors=p.advisors;
  const top=advisors[0],rest=advisors.slice(1);
  const gen=data.generatedAt?new Date(data.generatedAt):null;

  let html=`
  <div style="--co:${co.color}">
    <div class="topbar">
      <div class="big-title">${esc(co.label)} - Sales<span class="period">${PERIOD_LABEL[period]}</span></div>
      <div class="controls">
        <span class="ctl" onclick="nav(-1)"><span class="arr">&#8249;</span> Prev</span>
        <span class="ctl" onclick="nav(1)">Next <span class="arr">&#8250;</span></span>
        <span class="sep">|</span>
        <span class="ctl ${paused?"":"dim"}" onclick="togglePause()">${paused?"&#9654; Play":"Pause &#10073;&#10073;"}</span>
      </div>
      <div class="co-badge"><div class="co-name">${esc(co.label)}</div><div class="co-sub">Comfort Advisors</div></div>
    </div>`;

  if(!advisors.length){
    html+=`<div class="card" style="padding:60px;text-align:center;color:#999;font-weight:700">No active Comfort Advisors found.</div>`;
  }else{
    html+=`<div class="board">
      <div class="feature"><div class="fcard">
        <div class="fc-head"><div><div class="fc-name">${esc(top.name)}</div><div class="fc-dept">${esc(top.dept)}</div></div><div class="rankb">#1</div></div>
        <div class="fc-photo">${photoHTML(top,true)}</div>
        <div class="salesbar"><span class="v">${money(top.sales)}</span><span class="l">Sales</span></div>
        ${kpisHTML(top)}
      </div></div>
      <div class="grid">`;
    for(const a of rest){
      html+=`<div class="card">
        <div class="c-head"><div><div class="c-name">${esc(a.name)}</div><div class="c-dept">${esc(a.dept)}</div></div><div class="rankb">#${a.rank}</div></div>
        <div class="salesbar"><span class="v">${money(a.sales)}</span><span class="l">Sales</span></div>
        <div class="c-body">
          <div class="c-photo">${photoHTML(a,false)}</div>
          <div class="c-kpis">${kpisHTML(a)}</div>
        </div>
      </div>`;
    }
    html+=`</div></div>`;
  }

  html+=`<div class="footer">
    <span>${feedError?`<span class="warn">${esc(feedError)}</span>`:`Sales = sold estimates &middot; Closed Opps = runs with a sold estimate &middot; ${PERIOD_LABEL[period]==="MTD"?"Month":"Year"}-to-date`}</span>
    <span>${gen?"Updated "+gen.toLocaleString():""} &middot; auto-refresh every 15 min</span>
  </div></div>`;
  app.innerHTML=html;
}

function nav(d){
  idx=(idx+d+ORDER.length)%ORDER.length;
  localStorage.setItem(IDX_KEY,idx);
  render();
}
function togglePause(){
  paused=!paused;
  localStorage.setItem(PAUSE_KEY,paused?"1":"0");
  render();
}
setInterval(function(){if(!paused&&data)nav(1)},ROTATE_SECONDS*1000);

async function fetchData(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    data=await r.json();feedError=null;
    ORDER=["sierra","ultimate","russett"].filter(k=>data.companies&&data.companies[k])
          .flatMap(k=>[[k,"mtd"],[k,"ytd"]]);
    if(idx>=ORDER.length)idx=0;
  }catch(e){
    console.error(e);
    feedError=data?"Data feed temporarily unavailable - showing the last good pull.":"Data feed unavailable - try again in a minute.";
  }
}
async function refresh(){await fetchData();render()}

// ── access gate (hosted mode only; same code as the Command Center) ──
const ACCESS_HASH="a317cc2a63bdef8b314787da505ec86458118b1d9f87d95a6b3fa4272a582e16";
const ACCESS_KEY="cc-access-v1";
async function sha256hex(s){
  var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s));
  return[...new Uint8Array(b)].map(function(x){return x.toString(16).padStart(2,"0")}).join("");
}
async function gate(){
  var isLocal=location.protocol!=="https:";
  if(isLocal||!window.isSecureContext)return true;
  if(localStorage.getItem(ACCESS_KEY)===ACCESS_HASH)return true;
  for(;;){
    var code=prompt("Comfort Advisor Board\n\nEnter access code:");
    if(code===null)continue;
    if(await sha256hex(code.trim())===ACCESS_HASH){localStorage.setItem(ACCESS_KEY,ACCESS_HASH);return true}
    alert("Wrong access code.");
  }
}
gate().then(refresh);
setInterval(refresh,REFRESH_MINUTES*60*1000);
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight")nav(1);
  else if(e.key==="ArrowLeft")nav(-1);
  else if(e.key===" "){e.preventDefault();togglePause()}
});
</script>
</body>
</html>
